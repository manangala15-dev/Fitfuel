const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ── Helpers ────────────────────────────────────────────────────────────────
const ls = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};
const TODAY_IDX = new Date().getDay(); // 0=Sun
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const toDateKey = (d) => d.toISOString().slice(0,10);
const TODAY_KEY = toDateKey(new Date());
const subtractMins = (timeStr, mins) => {
  const [h, m] = (timeStr || '20:00').split(':').map(Number);
  const total = h * 60 + m - mins;
  const hh = Math.floor(total / 60) % 24;
  const mm = total % 60;
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
};

// ── Nutrition Calculator ───────────────────────────────────────────────────
function calcTargets(profile, dayType) {
  if (profile.customTargets && profile.customCal > 0) {
    return { calories: profile.customCal, protein: profile.customProtein || 0, carbs: profile.customCarbs || 0, fat: profile.customFat || 0 };
  }
  const weight = +profile.weight || 70;
  const height = +profile.height || 170;
  const age = +profile.age || 25;
  const { gender } = profile;
  const bmr = gender === 'male'
    ? 10 * weight + 6.25 * height - 5 * age + 5
    : 10 * weight + 6.25 * height - 5 * age - 161;
  const actMult = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 }[profile.activityLevel||'moderate'] || 1.55;
  const tdee = { football: bmr * 1.75, gym: bmr * actMult, rest: bmr * (actMult - 0.2), active: bmr * 1.4 }[dayType] || bmr * actMult;
  const goals = profile.goals || (profile.goal ? [profile.goal] : ['lose_fat']);
  const goalAdjs = { lose_fat:-400, build_muscle:200, improve_fitness:-150, increase_stamina:0, flexibility:0, stress_relief:0, maintain:0 };
  const totalAdj = goals.length ? goals.reduce((s,g) => s + (goalAdjs[g]||0), 0) / goals.length : -400;
  const hasMuscle = goals.includes('build_muscle');
  const cal = Math.round(tdee + totalAdj);
  const protein = Math.round(weight * (hasMuscle ? 2.5 : 2.2));
  const fat = Math.round((cal * 0.28) / 9);
  const carbs = Math.round((cal - protein * 4 - fat * 9) / 4);
  return { calories: Math.max(cal, 1200), protein, carbs: Math.max(carbs, 0), fat };
}

function getDayType(profile, dayIdx) {
  const dayName = DAY_NAMES[dayIdx].toLowerCase();
  const sports = profile.sports || [];
  if (sports.some(s => (s.days||[]).includes(dayName))) return 'football';
  if (profile.sportsDays?.includes(dayName) && (profile.sportsPlayed||[]).length > 0) return 'football';
  if (profile.gymDays?.includes(dayName)) return 'gym';
  if (['active','very_active'].includes(profile.activityLevel)) return 'active';
  return 'rest';
}

// ── Shopping List Modal ───────────────────────────────────────────────────
function ShoppingListModal({ selectedMeals, onClose }) {
  const [checked, setChecked] = useState({});
  const toggle = (key) => setChecked(c => ({ ...c, [key]: !c[key] }));

  // Gather all ingredients from every selected meal
  const allIngredients = useMemo(() => {
    const map = {};
    ['breakfast','lunch','snack','dinner'].forEach(type => {
      const mealList = MEALS[type];
      const selId = selectedMeals[type] || (mealList[0] && mealList[0].id);
      const meal = mealList.find(m => m.id === selId) || mealList[0];
      if (!meal) return;
      meal.ingredients.forEach(ing => {
        const k = ing.name.toLowerCase();
        if (!map[k]) map[k] = { name: ing.name, qtys: [], key: ing.key };
        map[k].qtys.push(`${type}: ${ing.qty}`);
      });
    });
    // Group by rough category based on name keywords
    const groups = { '🥦 Produce':[], '🌾 Grains & Legumes':[], '🥚 Protein':[], '🧀 Dairy':[], '🫙 Pantry & Spices':[], '🥑 Fats & Nuts':[] };
    Object.values(map).forEach(item => {
      const n = item.name.toLowerCase();
      if (/oat|rice|roti|naan|bread|pasta|pita|tortilla|flour|quinoa|dal|lentil|bean|chickpea|rajma|makhana/.test(n)) groups['🌾 Grains & Legumes'].push(item);
      else if (/egg|paneer/.test(n)) groups['🥚 Protein'].push(item);
      else if (/yogurt|curd|cream|cheese|feta|butter/.test(n)) groups['🧀 Dairy'].push(item);
      else if (/avocado|olive oil|ghee|almond|walnut|nut|tahini|peanut|chia|seed/.test(n)) groups['🥑 Fats & Nuts'].push(item);
      else if (/onion|tomato|pepper|spinach|carrot|cucumber|zucchini|garlic|ginger|chilli|herb|basil|coriander|lemon|lime|mint|banana|apple|berry|corn|broccoli|eggplant/.test(n)) groups['🥦 Produce'].push(item);
      else groups['🫙 Pantry & Spices'].push(item);
    });
    return groups;
  }, [selectedMeals]);

  const total = Object.values(allIngredients).reduce((s,g)=>s+g.length,0);
  const done = Object.values(checked).filter(Boolean).length;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-1">
          <h2 className="text-lg font-bold">🛒 Shopping List</h2>
          <button className="text-slate-400 text-2xl" onClick={onClose}>✕</button>
        </div>
        <p className="text-xs text-slate-500 mb-1">Based on today's selected meals · {done}/{total} collected</p>
        <div className="progress-bar-bg mb-4">
          <div className="progress-bar-fill" style={{width:`${total?done/total*100:0}%`,background:'#22c55e'}}/>
        </div>
        {Object.entries(allIngredients).map(([group, items]) => items.length === 0 ? null : (
          <div key={group} className="mb-4">
            <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">{group}</p>
            {items.map(item => {
              const k = item.name.toLowerCase();
              const isChecked = !!checked[k];
              return (
                <div key={k} className="check-item cursor-pointer" onClick={()=>toggle(k)}>
                  <div className="w-5 h-5 rounded border-2 flex items-center justify-center shrink-0"
                    style={{borderColor:isChecked?'#22c55e':'#3d3d3d',background:isChecked?'#052e16':'transparent'}}>
                    {isChecked && <span style={{color:'#22c55e',fontSize:11}}>✓</span>}
                  </div>
                  <div className="flex-1">
                    <p className="text-sm" style={{color:isChecked?'#475569':'#f1f5f9',textDecoration:isChecked?'line-through':'none'}}>
                      {item.name}
                      {item.key && <span className="ml-1 text-xs text-orange-400">★</span>}
                    </p>
                    <p className="text-xs text-slate-600">{item.qtys[0]}</p>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
        <p className="text-xs text-slate-600 mt-2">★ = key ingredient · tap to check off</p>
        <button className="btn btn-secondary w-full mt-3" onClick={onClose}>Done</button>
      </div>
    </div>
  );
}

// ── Toast ─────────────────────────────────────────────────────────────────
function Toast({ message, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3500); return () => clearTimeout(t); }, []);
  return (
    <div className="fixed top-5 left-1/2 z-50 px-4 py-3 rounded-2xl text-sm font-semibold text-white shadow-xl fade-in"
      style={{transform:'translateX(-50%)',background:'rgba(34,197,94,0.95)',border:'1px solid #16a34a',maxWidth:'88vw',textAlign:'center'}}>
      {message}
    </div>
  );
}

// ── SVG Macro Ring ────────────────────────────────────────────────────────
function MacroRing({ value, max, color, label, unit='g' }) {
  const r = 28, cx = 36, cy = 36;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(value / max, 1);
  const dash = pct * circ;
  return (
    <div className="flex flex-col items-center gap-1">
      <svg width="72" height="72">
        <circle className="ring-bg" cx={cx} cy={cy} r={r}/>
        <circle className="ring-fill" cx={cx} cy={cy} r={r}
          stroke={color} strokeDasharray={`${dash} ${circ}`}
          transform={`rotate(-90 ${cx} ${cy})`}/>
        <text x={cx} y={cy-4} textAnchor="middle" fill="var(--text)" fontSize="13" fontWeight="700">{value}</text>
        <text x={cx} y={cy+10} textAnchor="middle" fill="var(--text3)" fontSize="9">{unit}</text>
      </svg>
      <span style={{color, fontSize:11, fontWeight:600}}>{label}</span>
    </div>
  );
}

// ── Calorie Ring ──────────────────────────────────────────────────────────
function CalorieRing({ eaten, target }) {
  const r = 52, cx = 70, cy = 70;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(eaten / target, 1);
  const dash = pct * circ;
  const remaining = Math.max(target - eaten, 0);
  const over = eaten > target;
  return (
    <div className="flex flex-col items-center">
      <svg width="140" height="140">
        <circle className="ring-bg" cx={cx} cy={cy} r={r} strokeWidth="14"/>
        <circle cx={cx} cy={cy} r={r} fill="none" strokeWidth="14"
          stroke={over ? '#ef4444' : '#ffffff'} strokeLinecap="round"
          strokeDasharray={`${dash} ${circ}`}
          transform={`rotate(-90 ${cx} ${cy})`}
          style={{transition:'stroke-dasharray .6s ease'}}/>
        <text x={cx} y={cy-12} textAnchor="middle" fill="var(--text)" fontSize="26" fontWeight="800">{eaten}</text>
        <text x={cx} y={cy+8} textAnchor="middle" fill="var(--text3)" fontSize="11">eaten</text>
        <text x={cx} y={cy+26} textAnchor="middle" fill="var(--text2)" fontSize="12" fontWeight="600">
          {over ? `${eaten-target} over` : `${remaining} left`}
        </text>
      </svg>
      <p style={{fontSize:12,color:'var(--text3)',marginTop:-4}}>Target: {target} kcal</p>
    </div>
  );
}

                }}>{d.slice(0,3).charAt(0).toUpperCase()+d.slice(1,3)}</ChipBtn>;
              })}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <label style={{fontSize:11,color:'#888',flexShrink:0}}>Time:</label>
              <input className="input-field" type="time" value={sport.time||'18:00'} style={{flex:1}}
                onChange={e=>setForm(f=>({...f,sports:f.sports.map((s,i)=>i!==si?s:{...s,time:e.target.value})}))}/>
            </div>
          </div>
        ))}

        {/* Gym Days */}
        <div style={{marginBottom:16}}>
          <label style={{fontSize:12,color:'#a0a0a0',display:'block',marginBottom:8}}>Gym / Weight Training Days</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {['monday','tuesday','wednesday','thursday','friday','saturday','sunday'].map(d=>(
              <ChipBtn key={d} active={(form.gymDays||[]).includes(d)} onClick={()=>toggleArr('gymDays',d)}>{d.slice(0,3).charAt(0).toUpperCase()+d.slice(1,3)}</ChipBtn>
            ))}
          </div>
          <p style={{fontSize:11,color:'#555',marginTop:4}}>Skip if you don't gym — that's okay!</p>
        </div>

        {/* Activity Level */}
        <div style={{marginBottom:8}}>
          <label style={{fontSize:12,color:'#a0a0a0',display:'block',marginBottom:8}}>Overall Activity Level</label>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[['sedentary','Desk job 💻'],['light','Light 🚶'],['moderate','Moderate 🏃'],['very_active','Very Active 💪']].map(([v,l])=>(
              <ChipBtn key={v} active={form.activityLevel===v} onClick={()=>up('activityLevel',v)}>{l}</ChipBtn>
            ))}
          </div>
        </div>
        <BtnRow onBack={()=>setStep(3)} onNext={()=>setStep(5)}/>
      </div>
    </div>
  );

  if (step === 5) return (
    <div style={container} className="fade-in">
      <div style={card}>
        <Dots/>
        <h2 style={{fontSize:18,fontWeight:700,color:'#ffffff',marginBottom:20}}>Your Schedule</h2>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:24}}>
          <div>
            <label style={{fontSize:12,color:'#a0a0a0',display:'block',marginBottom:6}}>Wake Time</label>
            <input className="input-field" type="time" value={form.wakeTime}
              onChange={e=>up('wakeTime',e.target.value)}/>
          </div>
          <div>
            <label style={{fontSize:12,color:'#a0a0a0',display:'block',marginBottom:6}}>Sleep Time</label>
            <input className="input-field" type="time" value={form.sleepTime}
              onChange={e=>up('sleepTime',e.target.value)}/>
          </div>
        </div>
        <button className="btn btn-primary w-full" style={{fontSize:16,padding:'14px'}}
          onClick={()=>{
            onComplete({ ...form, setupComplete:true, startWeight:+form.weight||0, startBodyFat:+form.bodyFat||0, startDate:TODAY_KEY });
          }}>
          Let's Go! 🚀
        </button>
        <button className="btn btn-secondary w-full" style={{marginTop:8}} onClick={()=>setStep(4)}>← Back</button>
      </div>
    </div>
  );

  return null;
}

// ── Supplement Tracker ────────────────────────────────────────────────────
const DEFAULT_SUPPS = [
  { name:'Creatine Monohydrate', dose:'3–5g', timing:'morning', color:'#ffffff', benefit:'Strength + muscle volume' },
  { name:'Vitamin D3 + K2', dose:'2000–4000 IU', timing:'morning', color:'#f59e0b', benefit:'Immunity, testosterone, bones' },
  { name:'Omega-3 (Fish Oil)', dose:'1–2g EPA+DHA', timing:'morning', color:'#0284c7', benefit:'Anti-inflammatory, recovery' },
  { name:'Magnesium Glycinate', dose:'300–400mg', timing:'evening', color:'#059669', benefit:'Sleep quality, muscle cramps' },
  { name:'Whey / Plant Protein', dose:'25–30g', timing:'post-workout', color:'#ea580c', benefit:'Hit protein target easily' },
];

function SupplementTracker({ profile }) {
  const [taken, setTaken] = useState(() => ls.get('fitfuel_supps_' + TODAY_KEY, []));
  const [customSupps, setCustomSupps] = useState(() => ls.get('fitfuel_custom_supps', []));
  const [showAdd, setShowAdd] = useState(false);
  const [newSupp, setNewSupp] = useState({ name:'', dose:'', timing:'morning' });

  const toggle = (name) => {
    const updated = taken.includes(name) ? taken.filter(t=>t!==name) : [...taken, name];
    setTaken(updated);
    ls.set('fitfuel_supps_' + TODAY_KEY, updated);
  };

  const addCustom = () => {
    if (!newSupp.name) return;
    const supp = { ...newSupp, color:'#ffffff', benefit:'Custom supplement' };
    const updated = [...customSupps, supp];
    setCustomSupps(updated);
    ls.set('fitfuel_custom_supps', updated);
    setNewSupp({ name:'', dose:'', timing:'morning' });
    setShowAdd(false);
  };

  const removeCustom = (name) => {
    const updated = customSupps.filter(s=>s.name!==name);
    setCustomSupps(updated);
    ls.set('fitfuel_custom_supps', updated);
    const updatedTaken = taken.filter(t=>t!==name);
    setTaken(updatedTaken);
    ls.set('fitfuel_supps_' + TODAY_KEY, updatedTaken);
  };

  const allSupps = [...DEFAULT_SUPPS, ...customSupps];
  const groups = [
    { label:'🌅 Morning', key:'morning' },
    { label:'🌙 Evening / Pre-Bed', key:'evening' },
    { label:'💪 Post-Workout', key:'post-workout' },
  ];
  const takenCount = taken.length;

  return (
    <div className="mx-5 mb-4">
      <div className="flex items-center justify-between mb-2">
        <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider">💊 Supplements</h2>
        <div className="flex items-center gap-2">
          <span className="text-xs text-slate-500">{takenCount}/{allSupps.length} today</span>
          <button className="text-xs font-semibold px-2 py-1 rounded-lg"
            style={{background:'rgba(255,255,255,0.12)',color:'#ffffff',border:'1px solid rgba(255,255,255,0.25)'}}
            onClick={()=>setShowAdd(s=>!s)}>+ Add</button>
        </div>
      </div>
      <div className="gradient-card rounded-2xl p-4">
        {takenCount === allSupps.length && allSupps.length > 0 && (
          <div className="rounded-xl p-2 mb-3 text-center" style={{background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.25)'}}>
            <p className="text-xs text-green-400 font-semibold">✓ All supplements taken today!</p>
          </div>
        )}
        {groups.map(grp => {
          const grpSupps = allSupps.filter(s=>s.timing===grp.key);
          if (!grpSupps.length) return null;
          const allTaken = grpSupps.every(s=>taken.includes(s.name));
          return (
            <div key={grp.key} className="mb-3 last:mb-0">
              <div className="flex items-center justify-between mb-1.5">
                <p className="text-xs font-semibold text-slate-400">{grp.label}</p>
                <button className="text-xs text-cyan-400" onClick={()=>{
                  const names = grpSupps.map(s=>s.name);
                  const updated = allTaken ? taken.filter(t=>!names.includes(t)) : [...new Set([...taken,...names])];
                  setTaken(updated); ls.set('fitfuel_supps_'+TODAY_KEY,updated);
                }}>{allTaken?'Uncheck all':'Take all'}</button>
              </div>
              {grpSupps.map(s=>{
                const isTaken = taken.includes(s.name);
                return (
                  <div key={s.name} className="flex items-center gap-3 rounded-xl p-3 mb-1.5 cursor-pointer transition-all"
                    style={{background: isTaken ? `${s.color}15` : '#0d0d0d', border:`1px solid ${isTaken?s.color+'40':'#1a1a1a'}`}}
                    onClick={()=>toggle(s.name)}>
                    <div className="w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 transition-all"
                      style={{borderColor: isTaken ? s.color : '#3d3d3d', background: isTaken ? s.color : 'transparent'}}>
                      {isTaken && <span className="text-white text-xs">✓</span>}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-1.5">
                        <p className="text-sm font-semibold" style={{color: isTaken ? '#f1f5f9' : '#94a3b8'}}>{s.name}</p>
                        {s.dose && <span className="text-xs text-slate-500">· {s.dose}</span>}
                        {customSupps.find(cs=>cs.name===s.name) && (
                          <button className="text-red-500 text-xs ml-auto" onClick={e=>{e.stopPropagation();removeCustom(s.name);}}>✕</button>
                        )}
                      </div>
                      <p className="text-xs mt-0.5" style={{color: isTaken ? s.color : '#475569'}}>{s.benefit}</p>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
        {showAdd && (
          <div className="mt-3 pt-3 border-t border-slate-800 space-y-2">
            <p className="text-xs font-semibold text-slate-300">Add Custom Supplement</p>
            <input className="input-field text-sm" placeholder="Name (e.g. Zinc, B12...)" value={newSupp.name}
              onChange={e=>setNewSupp(s=>({...s,name:e.target.value}))}/>
            <div className="grid grid-cols-2 gap-2">
              <input className="input-field text-sm" placeholder="Dose (e.g. 25mg)" value={newSupp.dose}
                onChange={e=>setNewSupp(s=>({...s,dose:e.target.value}))}/>
              <select className="input-field text-sm" value={newSupp.timing}
                onChange={e=>setNewSupp(s=>({...s,timing:e.target.value}))}>
                <option value="morning">Morning</option>
                <option value="evening">Evening</option>
                <option value="post-workout">Post-Workout</option>
              </select>
            </div>
            <button className="btn btn-primary w-full text-sm" onClick={addCustom}>Add Supplement</button>
          </div>
        )}
        <p className="text-xs text-slate-600 mt-3">Consult a doctor before starting new supplements.</p>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────
const MEAL_META = [
  { key:'breakfast', icon:'🌅', label:'Breakfast', hour:8  },
  { key:'lunch',     icon:'☀️',  label:'Lunch',     hour:13 },
  { key:'snack',     icon:'🍎', label:'Snack',     hour:16 },
  { key:'dinner',    icon:'🌙', label:'Dinner',    hour:20 },
];

function Dashboard({ profile, targets, dayType, selectedMeals, eatenMeals, onNavigate, water, addWater, steps, setSteps, customMeals, customActivities, showToast, onOpenSettings }) {
  const mealEaten      = Object.values(eatenMeals).reduce((s,m) => s + (m?.cal     || 0), 0);
  const customEaten    = (customMeals||[]).reduce((s,m)=>s+(m.cal    ||0),0);
  const stepsBurned    = Math.round((steps||0)*0.04*(profile.weight/70));
  const activityBurned = (customActivities||[]).reduce((s,a)=>s+(a.kcalBurned||0),0) + stepsBurned;
  const eaten  = mealEaten + customEaten;
  const eatenP = Object.values(eatenMeals).reduce((s,m)=>s+(m?.protein||0),0)+(customMeals||[]).reduce((s,m)=>s+(m.protein||0),0);
  const eatenC = Object.values(eatenMeals).reduce((s,m)=>s+(m?.carbs  ||0),0)+(customMeals||[]).reduce((s,m)=>s+(m.carbs  ||0),0);
  const eatenF = Object.values(eatenMeals).reduce((s,m)=>s+(m?.fat    ||0),0)+(customMeals||[]).reduce((s,m)=>s+(m.fat    ||0),0);

  const workout    = WORKOUTS[WORKOUT_SCHEDULE[TODAY_IDX]];
  const hour       = new Date().getHours();
  const greeting   = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const isFootball = dayType === 'football';

  const waterTarget = isFootball ? 4 : 3.5;
  const waterPct    = Math.min(water / waterTarget, 1);

  const bfLost         = +(profile.bodyFat - profile.targetBodyFat).toFixed(1);
  const fatKgToLose    = +((bfLost / 100) * profile.weight).toFixed(1);
  const daysToGoal     = Math.round(fatKgToLose / 0.05);
  const weightLost     = profile.startWeight    ? +(profile.startWeight    - profile.weight).toFixed(1)  : 0;
  const bfLostStart    = profile.startBodyFat   ? +(profile.startBodyFat   - profile.bodyFat).toFixed(1) : 0;
  const hasProgress    = weightLost > 0.1 || bfLostStart > 0.1;
  const mealsLoggedCnt = Object.values(eatenMeals).filter(Boolean).length;

  // Time-aware next-action card
  const nextAction = (() => {
    for (const m of MEAL_META) {
      if (hour >= m.hour - 1 && hour < m.hour + 2 && !eatenMeals[m.key])
        return { label:`${m.icon} Time to log ${m.label.toLowerCase()}?`, tab:'meals', color:'#ffffff' };
    }
    if (water < 0.5 && hour >= 7)
      return { label:'💧 Drink your first glass of water!', tab:null, color:'#ffffff', action:()=>{ addWater(0.25); showToast('💧 +250ml logged'); } };
    if (water < waterTarget * 0.5 && hour >= 14)
      return { label:`💧 Halfway there on water — ${(waterTarget - water).toFixed(1)}L left`, tab:null, color:'#ffffff', action:()=>{ addWater(0.5); showToast('💧 +500ml logged'); } };
    return null;
  })();

  return (
    <div className="fade-in pb-32">

      {/* ── Sticky header ─────────────────────────────── */}
      <div className="app-header">
        <div>
          <p style={{fontSize:13,color:'var(--text2)'}}>{greeting}, <strong style={{color:'var(--text)'}}>{profile.name.split(' ')[0]}</strong> 👋</p>
          <p style={{fontSize:12,color:'var(--text3)',marginTop:1}}>
            {DAY_NAMES[TODAY_IDX]} · {new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'})}
            {' · '}<span style={{color:workout.color}}>{workout.icon} {dayType.charAt(0).toUpperCase()+dayType.slice(1)} day</span>
          </p>
        </div>
        <button onClick={onOpenSettings}
          style={{width:38,height:38,borderRadius:12,background:'var(--card)',border:'1px solid var(--border2)',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
          ⚙️
        </button>
      </div>

      {/* ── Sports day banner ─────────────────────────── */}
      {isFootball && (
        <div className="mx-5 mb-3 flex items-center gap-2 rounded-2xl px-4 py-3"
          style={{background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.3)'}}>
          <span className="text-lg">⚽</span>
          <div className="flex-1">
            <p className="text-green-400 text-sm font-bold">Sports day!</p>
            <p className="text-xs text-green-600">
              {profile.sportsPlayed?.join(', ')||'Sports'}
              {profile.sportsTime ? ` · at ${profile.sportsTime} · Pre-match snack by ${subtractMins(profile.sportsTime,90)}` : ''}
            </p>
          </div>
        </div>
      )}

      {/* ── Progress achievement banner ───────────────── */}
      {hasProgress && (
        <div className="mx-5 mb-3 rounded-2xl px-4 py-2.5"
          style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.3)'}}>
          <p className="text-cyan-300 text-xs font-semibold">
            📈 {weightLost > 0 ? `−${weightLost}kg` : ''}{weightLost>0&&bfLostStart>0?' · ':''}{bfLostStart>0?`−${bfLostStart}% BF`:''} since you started — targets recalculated ✓
          </p>
        </div>
      )}

      {/* ── Next action contextual prompt ────────────── */}
      {nextAction && (
        <div className="px-5 mb-3">
          <button className="action-card w-full"
            style={{background:`${nextAction.color}12`,border:`1px solid ${nextAction.color}35`}}
            onClick={()=>nextAction.action ? nextAction.action() : onNavigate(nextAction.tab)}>
            <p style={{fontSize:14,fontWeight:600,color:nextAction.color,flex:1}}>{nextAction.label}</p>
            <span style={{color:nextAction.color,fontSize:18}}>›</span>
          </button>
        </div>
      )}

      {/* ── Calorie + macro rings ─────────────────────── */}
      <div className="gradient-card rounded-3xl mx-5 p-5 mb-4">
        <div className="flex items-center justify-around">
          <CalorieRing eaten={eaten} target={targets.calories}/>
          <div className="flex flex-col gap-4">
            <MacroRing value={eatenP} max={targets.protein} color="#34d399" label="Protein"/>
            <MacroRing value={eatenC} max={targets.carbs}   color="#38bdf8" label="Carbs"/>
            <MacroRing value={eatenF} max={targets.fat}     color="#fb923c" label="Fat"/>
          </div>
        </div>
        {activityBurned > 0 && (
          <div className="flex items-center justify-between mt-3 pt-3"
            style={{borderTop:'1px solid var(--border)'}}>
            <p style={{fontSize:12,color:'var(--text2)'}}>Activity burn adds back</p>
            <p style={{fontSize:14,fontWeight:700,color:'#fb923c'}}>+{activityBurned} kcal</p>
          </div>
        )}
      </div>

      {/* ── Water tracker (inline 1-tap) ─────────────── */}
      <div className="gradient-card rounded-2xl mx-5 mb-4 p-4">
        <div className="flex items-center justify-between mb-2">
          <div>
            <p style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>💧 Water</p>
            <p style={{fontSize:11,color:'var(--text3)'}}>Target {waterTarget}L · {(waterTarget-water)>0?`${(waterTarget-water).toFixed(1)}L left`:'✓ Goal met!'}</p>
          </div>
          <p style={{fontSize:22,fontWeight:800,color:waterPct>=1?'#22c55e':'#ffffff'}}>{water.toFixed(1)}<span style={{fontSize:13,fontWeight:500}}> L</span></p>
        </div>
        <div className="water-bar mb-3">
          <div className="water-bar-fill" style={{width:`${waterPct*100}%`}}/>
        </div>
        <div className="grid grid-cols-4 gap-2">
          {[{icon:'🥛',label:'250ml',amt:0.25},{icon:'💧',label:'500ml',amt:0.5},{icon:'🫗',label:'750ml',amt:0.75},{icon:'🏺',label:'1 L',amt:1}].map(b=>(
            <button key={b.amt} className="quick-chip"
              onClick={()=>{ addWater(b.amt); showToast(`💧 +${b.label} logged`); }}>
              <span style={{fontSize:20}}>{b.icon}</span>
              <span style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginTop:3}}>{b.label}</span>
            </button>
          ))}
        </div>
        {water > 0 && (
          <button style={{fontSize:11,color:'var(--text3)',marginTop:8,width:'100%',textAlign:'center',cursor:'pointer',background:'none',border:'none'}}
            onClick={()=>{ addWater(-0.25); showToast('↩ Undone −250ml'); }}>
            ↩ Undo last
          </button>
        )}
      </div>

      {/* ── Meal status ──────────────────────────────── */}
      <div className="gradient-card rounded-2xl mx-5 mb-4 p-4">
        <div className="flex items-center justify-between mb-3">
          <p style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>🍽️ Today's Meals</p>
          <button style={{fontSize:12,color:'#ffffff',fontWeight:700,background:'none',border:'none',cursor:'pointer'}}
            onClick={()=>onNavigate('meals')}>View all ›</button>
        </div>
        <div className="grid grid-cols-4 gap-2 mb-2">
          {MEAL_META.map(m=>{
            const ate = !!eatenMeals[m.key];
            return (
              <button key={m.key} className="meal-status-chip"
                style={{background:ate?'rgba(34,197,94,0.15)':'var(--card)',border:`1px solid ${ate?'rgba(34,197,94,0.4)':'var(--border2)'}`}}
                onClick={()=>onNavigate('meals')}>
                <p style={{fontSize:22}}>{ate?'✅':m.icon}</p>
                <p style={{fontSize:10,fontWeight:600,color:ate?'#22c55e':'var(--text2)',marginTop:4}}>{m.label}</p>
              </button>
            );
          })}
        </div>
        <p style={{fontSize:12,color:'var(--text3)',textAlign:'center'}}>
          {mealsLoggedCnt}/4 logged · {eaten} / {targets.calories} kcal
        </p>
      </div>

      {/* ── Today's workout CTA ───────────────────────── */}
      <div className="px-5 mb-4">
        <button className="workout-nav-btn" onClick={()=>onNavigate('workout')}>
          <div className="flex items-center gap-3">
            <div style={{width:48,height:48,borderRadius:14,background:`${workout.color}20`,border:`1px solid ${workout.color}40`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>
              {workout.icon}
            </div>
            <div style={{flex:1}}>
              <p style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{workout.name}</p>
              <p style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{workout.subtitle}</p>
            </div>
            <div style={{background:'rgba(255,255,255,0.35)',borderRadius:10,padding:'6px 12px',flexShrink:0}}>
              <p style={{fontSize:12,fontWeight:700,color:'#c4b5fd'}}>Start →</p>
            </div>
          </div>
        </button>
        <button style={{width:'100%',marginTop:8,borderRadius:14,padding:'10px 16px',background:'rgba(56,189,248,0.07)',border:'1px solid rgba(56,189,248,0.2)',fontSize:13,fontWeight:600,color:'#7dd3fc',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}
          onClick={()=>onNavigate('weekly')}>
          📅 View weekly plan ›
        </button>
      </div>

      {/* ── Quick stats strip ─────────────────────────── */}
      <div className="grid grid-cols-3 gap-3 px-5 mb-4">
        {[
          {label:'Weight',    value:`${profile.weight} kg`, color:'#ffffff'},
          {label:'Body Fat',  value:`${profile.bodyFat}%`,  color:'#fb923c'},
          {label:'Days left', value:`~${daysToGoal}d`,       color:'#22c55e'},
        ].map(s=>(
          <div key={s.label} className="stat-pill">
            <p style={{fontSize:16,fontWeight:800,color:s.color}}>{s.value}</p>
            <p style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{s.label}</p>
          </div>
        ))}
      </div>

      {/* ── Supplements ───────────────────────────────── */}
      <SupplementTracker profile={profile}/>

      {/* ── Alcohol reminder (subtle) ─────────────────── */}
      <div className="mx-5 mb-4 rounded-2xl p-3" style={{background:'rgba(234,88,12,0.06)',border:'1px solid rgba(234,88,12,0.15)'}}>
        <p style={{fontSize:12,color:'#fdba74',fontWeight:600}}>🍷 Alcohol reminder</p>
        <p style={{fontSize:11,color:'var(--text3)',marginTop:3,lineHeight:1.5}}>Each drink ≈ 120–180 kcal and slows recovery. Log in Progress tab. Avoid on football days.</p>
      </div>
    </div>
  );
}


// ── Meals View ────────────────────────────────────────────────────────────
function MealsView({ profile, dayType, selectedMeals, onSelectMeal, eatenMeals, onToggleEaten, pantry, onTogglePantry, customMeals, onAddCustomMeal }) {
  const [openOptions, setOpenOptions] = useState(null);
  const [openIngredients, setOpenIngredients] = useState(null);
  const [showShopping, setShowShopping] = useState(false);
  const [showCustomMeal, setShowCustomMeal] = useState(false);
  const isFootball = dayType === 'football';

  const getOptions = (type) => {
    let opts = MEALS[type];
    if (type === 'snack' && isFootball) {
      // Put pre-football snack first on football days
      opts = [MEALS.snack.find(s=>s.isFootballSnack), ...MEALS.snack.filter(s=>!s.isFootballSnack)];
    }
    return opts;
  };

  const getAlternatives = (type, currentId) => {
    const opts = MEALS[type].filter(m => m.id !== currentId);
    const available = opts.filter(m =>
      m.ingredients.filter(i => i.key).every(i => pantry.includes(i.name.toLowerCase()))
    );
    return available.length > 0 ? available : opts.slice(0,2);
  };

  const activeMeal = (type) => {
    const opts = getOptions(type);
    const sel = selectedMeals[type] || opts[0].id;
    return MEALS[type].find(m=>m.id===sel) || opts[0];
  };

  return (
    <div className="fade-in pb-24 px-5 pt-5">
      <div className="flex items-center justify-between mb-1">
        <h1 className="text-xl font-bold text-white">Today's Meals</h1>
        <button className="btn btn-secondary text-xs px-3 py-2" onClick={() => setShowShopping(true)}>🛒 Shopping List</button>
      </div>
      <p className="text-xs text-slate-400 mb-4">
        {isFootball ? '⚽ Football day — higher carbs, pre-match snack recommended' : 'Tap "Switch" to choose from 6 options per meal'}
      </p>
      {['breakfast','lunch','snack','dinner'].map(type=>(
        <MealCard key={type}
          mealType={type}
          options={getOptions(type)}
          selected={selectedMeals[type] || getOptions(type)[0].id}
          onOpenOptions={() => setOpenOptions(type)}
          onOpenIngredients={() => setOpenIngredients(type)}
          eaten={!!eatenMeals[type]}
          onToggleEaten={(meal) => onToggleEaten(type, meal)}
        />
      ))}
      {/* Log extra meal — placed here next to the meal cards */}
      <button className="w-full rounded-2xl py-3 mb-3 text-sm font-semibold flex items-center justify-center gap-2"
        style={{background:'rgba(255,255,255,0.12)',color:'#ffffff',border:'1px dashed rgba(255,255,255,0.4)'}}
        onClick={()=>setShowCustomMeal(true)}>
        + Log a Meal / Snack Not in the Plan
      </button>
      <div className="gradient-card rounded-2xl p-4 mt-2" style={{border:'1px solid rgba(99,102,241,0.2)'}}>
        <p className="text-xs text-indigo-400 mb-1 font-semibold">📚 About this meal plan</p>
        <p className="text-xs text-slate-500 leading-relaxed mb-2">Macros follow the <span className="text-white">Mifflin-St Jeor formula</span> for BMR (endorsed by the Academy of Nutrition & Dietetics). Protein target: 2.2g/kg (ISSN sports nutrition guidelines). Meals are designed around <span className="text-white">Indian vegetarian whole foods</span> — dal, paneer, oats, legumes — aligned with ICMR dietary guidelines. Calorie deficit: 350 kcal/day for ~0.35kg/week fat loss, preserving muscle mass.</p>
      </div>
      <div className="gradient-card rounded-2xl p-4 mt-2">
        <p className="text-sm font-bold text-slate-300 mb-2">💡 Notes for today</p>
        {isFootball ? (
          <ul className="text-xs text-slate-400 space-y-1">
            <li>• Have your pre-football snack ~90 mins before kickoff (~{profile?.footballTime || '20:00'})</li>
            <li>• Drink 500ml water 2 hrs before the match</li>
            <li>• Post-match dinner = high protein for recovery</li>
            <li>• Coconut water or electrolytes after the match</li>
          </ul>
        ) : (
          <ul className="text-xs text-slate-400 space-y-1">
            <li>• Eat breakfast within 1 hour of waking</li>
            <li>• Drink 3–3.5 litres of water today</li>
            <li>• Pre-workout: eat 90 mins before training</li>
            <li>• Post-workout: high protein meal within 45 mins</li>
          </ul>
        )}
      </div>
      {customMeals && customMeals.length > 0 && (
        <div className="gradient-card rounded-2xl p-4 mt-2">
          <p className="text-sm font-bold text-slate-300 mb-2">🍽️ Extra Meals Logged Today</p>
          {customMeals.map(m=>(
            <div key={m.id} className="flex items-center justify-between py-1.5 border-b border-slate-800 last:border-0">
              <div>
                <p className="text-sm text-white">{m.name}</p>
                <p className="text-xs text-slate-500 capitalize">{m.type}</p>
              </div>
              <div className="text-right">
                <p className="text-xs text-cyan-300 font-semibold">{m.cal} kcal</p>
                {m.protein > 0 && <p className="text-xs text-slate-500">P:{m.protein}g</p>}
              </div>
            </div>
          ))}
        </div>
      )}
      {openOptions && (
        <MealOptionsModal mealType={openOptions} options={getOptions(openOptions)}
          selected={selectedMeals[openOptions] || getOptions(openOptions)[0].id}
          onSelect={id => onSelectMeal(openOptions, id)}
          onClose={() => setOpenOptions(null)}/>
      )}
      {openIngredients && (
        <IngredientsModal meal={activeMeal(openIngredients)} pantry={pantry}
          onTogglePantry={onTogglePantry}
          alternatives={getAlternatives(openIngredients, activeMeal(openIngredients).id)}
          onAdaptMeal={id => { onSelectMeal(openIngredients, id); setOpenIngredients(null); }}
          onClose={() => setOpenIngredients(null)}/>
      )}
      {showShopping && (
        <ShoppingListModal selectedMeals={selectedMeals} onClose={() => setShowShopping(false)}/>
      )}
      {showCustomMeal && (
        <CustomMealModal onSave={m=>{onAddCustomMeal(m);setShowCustomMeal(false);}} onClose={()=>setShowCustomMeal(false)}/>
      )}
    </div>
  );
}

// ── USDA FoodData Central search (free, no CORS issues) ──────────────────
async function searchUSDA(query) {
  if (!navigator.onLine) return [];
  try {
    const url = `https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(query)}&api_key=DEMO_KEY&pageSize=8&dataType=Foundation,SR%20Legacy,Survey%20(FNDDS)`;
    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
    if (!res.ok) return [];
    const data = await res.json();
    return (data.foods || []).slice(0, 6).map(food => {
      const getNut = (id) => {
        const n = (food.foodNutrients || []).find(n => n.nutrientId === id);
        return n ? Math.round(n.value) : 0;
      };
      // Nicely format the food name (USDA uses ALL CAPS)
      const rawName = food.description || '';
      const niceName = rawName.split(',').slice(0,2).map(s =>
        s.trim().toLowerCase().replace(/\b\w/g, c => c.toUpperCase())
      ).join(', ');
      return {
        name: niceName,
        rawName,
        cal: getNut(1008),
        protein: getNut(1003),
        carbs: getNut(1005),
        fat: getNut(1004),
        source: 'usda',
        per100g: true,
      };
    }).filter(f => f.cal > 0 && f.cal < 900);
  } catch { return []; }
}

// ── Smart offline estimation via keyword matching ─────────────────────────
function estimateNutrition(query) {
  const q = query.toLowerCase();
  const match = (words) => words.some(w => q.includes(w));
  if (match(['dal','lentil','dhal'])) return {cal:205,protein:13,carbs:30,fat:4,note:'Est. per cup — typical dal'};
  if (match(['paneer'])) return {cal:280,protein:18,carbs:5,fat:21,note:'Est. per 100g paneer dish'};
  if (match(['rice','biryani','pulao'])) return {cal:240,protein:5,carbs:50,fat:2,note:'Est. per cup cooked rice'};
  if (match(['roti','chapati','paratha'])) return {cal:110,protein:3,carbs:20,fat:3,note:'Est. per roti'};
  if (match(['bread','toast','sandwich'])) return {cal:180,protein:6,carbs:32,fat:3,note:'Est. 2 slices'};
  if (match(['salad'])) return {cal:100,protein:3,carbs:12,fat:5,note:'Est. per bowl — varies widely'};
  if (match(['fruit','smoothie'])) return {cal:100,protein:1,carbs:25,fat:0,note:'Est. per serving'};
  if (match(['chicken','mutton','fish','egg'])) return {cal:200,protein:25,carbs:0,fat:10,note:'Est. per 100g — non-veg'};
  if (match(['milk','chai','coffee','tea'])) return {cal:75,protein:3,carbs:8,fat:3,note:'Est. per cup'};
  if (match(['cookie','biscuit','cake','sweet','mithai','barfi','ladoo'])) return {cal:280,protein:4,carbs:40,fat:12,note:'Est. per serving — varies'};
  if (match(['pizza'])) return {cal:270,protein:10,carbs:34,fat:10,note:'Est. per slice'};
  if (match(['burger','wrap','roll'])) return {cal:350,protein:12,carbs:42,fat:13,note:'Est. per piece'};
  if (match(['pasta','noodle','maggi'])) return {cal:350,protein:10,carbs:60,fat:7,note:'Est. per bowl'};
  if (match(['juice','shake','lassi'])) return {cal:150,protein:4,carbs:28,fat:3,note:'Est. per 250ml'};
  if (match(['nut','almond','cashew','peanut','walnut'])) return {cal:175,protein:6,carbs:7,fat:15,note:'Est. per 30g handful'};
  if (match(['chocolate'])) return {cal:150,protein:2,carbs:18,fat:9,note:'Est. per 30g bar'};
  if (match(['soup'])) return {cal:120,protein:5,carbs:16,fat:4,note:'Est. per bowl'};
  return null;
}

// ── Custom Meal Modal ─────────────────────────────────────────────────────
function CustomMealModal({ onSave, onClose }) {
  const [query, setQuery] = useState('');
  const [form, setForm] = useState({ name:'', type:'snack', cal:'', protein:'', carbs:'', fat:'' });
  const [photoSrc, setPhotoSrc] = useState(null);
  const [showSuggestions, setShowSuggestions] = useState(true);
  const [usdaResults, setUsdaResults] = useState([]);
  const [usdaLoading, setUsdaLoading] = useState(false);
  const [servingG, setServingG] = useState(100); // for USDA per-100g results
  const [pickedUSDA, setPickedUSDA] = useState(null);
  const [offline, setOffline] = useState(!navigator.onLine);
  const [estimate, setEstimate] = useState(null);
  const fileRef = useRef(null);
  const usdaTimerRef = useRef(null);

  // Update estimate when query changes and no local match
  useEffect(() => {
    if (!navigator.onLine) setOffline(true);
  }, []);

  const localSuggestions = query.length > 1
    ? FOOD_DB.filter(f => f.name.toLowerCase().includes(query.toLowerCase())).slice(0, 5)
    : [];

  const handleSearch = (val) => {
    setQuery(val);
    setPickedUSDA(null);
    setShowSuggestions(true);
    if (val.length < 2) { setUsdaResults([]); setEstimate(null); return; }
    // Offline estimation
    if (!navigator.onLine || val.length > 2) {
      const est = estimateNutrition(val);
      setEstimate(est);
    }
    // Debounced USDA search when local results are sparse
    clearTimeout(usdaTimerRef.current);
    if (val.length >= 3) {
      setUsdaLoading(true);
      usdaTimerRef.current = setTimeout(async () => {
        const results = await searchUSDA(val);
        setUsdaResults(results);
        setUsdaLoading(false);
      }, 600);
    }
  };

  const pick = (food, isUSDA = false) => {
    if (isUSDA) {
      setPickedUSDA(food);
      const g = servingG;
      const scale = g / 100;
      setForm({ name: food.name, type: 'snack',
        cal: String(Math.round(food.cal * scale)),
        protein: String(Math.round(food.protein * scale)),
        carbs: String(Math.round(food.carbs * scale)),
        fat: String(Math.round(food.fat * scale)),
      });
    } else {
      setPickedUSDA(null);
      setForm({ name:food.name, type:'snack', cal:String(food.cal), protein:String(food.protein), carbs:String(food.carbs), fat:String(food.fat) });
    }
    setQuery(food.name);
    setShowSuggestions(false);
    setEstimate(null);
  };

  const handlePhoto = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setPhotoSrc(ev.target.result);
    reader.readAsDataURL(file);
  };

  // When serving size changes, rescale USDA values
  const updateServing = (g) => {
    setServingG(g);
    if (!pickedUSDA) return;
    const scale = g / 100;
    setForm(f => ({...f,
      cal: String(Math.round(pickedUSDA.cal * scale)),
      protein: String(Math.round(pickedUSDA.protein * scale)),
      carbs: String(Math.round(pickedUSDA.carbs * scale)),
      fat: String(Math.round(pickedUSDA.fat * scale)),
    }));
  };

  const applyEstimate = () => {
    if (!estimate) return;
    setForm(f => ({...f, cal:String(estimate.cal), protein:String(estimate.protein), carbs:String(estimate.carbs), fat:String(estimate.fat), name:query}));
  };

  const save = () => {
    if (!form.name || !form.cal) return;
    onSave({ ...form, cal:+form.cal, protein:+(form.protein||0), carbs:+(form.carbs||0), fat:+(form.fat||0), id:Date.now() });
    onClose();
  };

  const up = (k,v) => setForm(f=>({...f,[k]:v}));

  const allSuggestions = [
    ...localSuggestions.map(f=>({...f,source:'local'})),
    ...usdaResults.filter(u => !localSuggestions.some(l => l.name.toLowerCase()===u.name.toLowerCase())),
  ];

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxHeight:'92dvh',overflowY:'auto'}}>
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-base font-bold" style={{color:'var(--text)'}}>🍽️ Log a Meal</h3>
          <button style={{color:'var(--text2)',fontSize:22,background:'none',border:'none',cursor:'pointer'}} onClick={onClose}>×</button>
        </div>

        {/* Photo capture */}
        <div className="mb-3">
          <input ref={fileRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhoto}/>
          {photoSrc ? (
            <div className="relative mb-2">
              <img src={photoSrc} alt="meal" className="w-full rounded-2xl object-cover" style={{maxHeight:140}}/>
              <button className="absolute top-2 right-2 bg-black bg-opacity-50 rounded-full w-6 h-6 text-white text-xs"
                onClick={()=>setPhotoSrc(null)}>×</button>
            </div>
          ) : (
            <button className="w-full rounded-2xl py-2.5 text-sm font-semibold flex items-center justify-center gap-2 mb-1"
              style={{background:'rgba(255,255,255,0.1)',border:'1px dashed rgba(255,255,255,0.4)',color:'#ffffff'}}
              onClick={()=>fileRef.current.click()}>
              📷 Take Photo of Meal
            </button>
          )}
        </div>

        {/* Food search */}
        <div className="relative mb-2">
          <label className="text-xs mb-1 block font-semibold" style={{color:'var(--text2)'}}>Search food item</label>
          <input className="input-field" placeholder="e.g. Dal Tadka, Omelette, Granola…"
            value={query} onChange={e=>handleSearch(e.target.value)}
            onFocus={()=>setShowSuggestions(true)}/>

          {/* Suggestions dropdown */}
          {showSuggestions && query.length > 1 && (
            <div className="absolute z-20 w-full rounded-2xl overflow-hidden mt-1"
              style={{background:'var(--bg2)',border:'1px solid var(--border2)',boxShadow:'0 8px 32px rgba(0,0,0,0.35)',maxHeight:280,overflowY:'auto'}}>

              {/* Local DB results */}
              {localSuggestions.map(f=>(
                <button key={f.name} className="w-full text-left px-4 py-2.5 transition-all"
                  style={{borderBottom:'1px solid var(--border)'}}
                  onMouseDown={()=>pick(f)}>
                  <div className="flex items-center justify-between">
                    <span className="text-sm font-semibold" style={{color:'var(--text)'}}>{f.name}</span>
                    <span className="text-xs px-1.5 py-0.5 rounded-md" style={{background:'rgba(34,197,94,0.15)',color:'#22c55e',fontSize:10}}>Local</span>
                  </div>
                  <span className="text-xs" style={{color:'var(--text2)'}}>{f.cal} kcal · P:{f.protein}g · C:{f.carbs}g · F:{f.fat}g</span>
                </button>
              ))}

              {/* USDA results */}
              {usdaLoading && (
                <div className="px-4 py-3 text-xs" style={{color:'var(--text3)'}}>
                  🔍 Searching USDA food database…
                </div>
              )}
              {!usdaLoading && usdaResults.filter(u=>!localSuggestions.some(l=>l.name.toLowerCase()===u.name.toLowerCase())).map((f,i)=>(
                <button key={i} className="w-full text-left px-4 py-2.5 transition-all"
                  style={{borderBottom:'1px solid var(--border)'}}
                  onMouseDown={()=>pick(f, true)}>
                  <div className="flex items-center justify-between">
                    <span className="text-sm font-semibold" style={{color:'var(--text)'}}>{f.name}</span>
                    <span className="text-xs px-1.5 py-0.5 rounded-md" style={{background:'rgba(56,189,248,0.15)',color:'#38bdf8',fontSize:10}}>USDA</span>
                  </div>
                  <span className="text-xs" style={{color:'var(--text2)'}}>{f.cal} kcal per 100g · P:{f.protein}g · C:{f.carbs}g · F:{f.fat}g</span>
                </button>
              ))}

              {/* No results + estimate */}
              {!usdaLoading && allSuggestions.length === 0 && estimate && (
                <div className="px-4 py-3">
                  <p className="text-xs font-semibold mb-1.5" style={{color:'#fb923c'}}>Not found — smart estimate based on food type:</p>
                  <div className="flex items-center justify-between">
                    <span className="text-xs" style={{color:'var(--text2)'}}>{estimate.note}</span>
                    <button className="text-xs font-bold px-3 py-1.5 rounded-xl"
                      style={{background:'rgba(251,146,60,0.2)',color:'#fb923c',border:'1px solid rgba(251,146,60,0.4)'}}
                      onMouseDown={applyEstimate}>
                      Use estimate
                    </button>
                  </div>
                  <div className="grid grid-cols-4 gap-1 mt-2 text-center">
                    {[['Cal',estimate.cal,'kcal','#f59e0b'],['Prot',estimate.protein,'g','#22c55e'],['Carbs',estimate.carbs,'g','#38bdf8'],['Fat',estimate.fat,'g','#fb923c']].map(([l,v,u,c])=>(
                      <div key={l} className="rounded-lg py-1.5" style={{background:'var(--card)'}}>
                        <p className="text-sm font-bold" style={{color:c}}>{v}</p>
                        <p className="text-xs" style={{color:'var(--text3)'}}>{l}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Offline indicator */}
              {offline && query.length >= 3 && (
                <div className="px-4 py-2 text-xs" style={{color:'var(--text3)',borderTop:'1px solid var(--border)'}}>
                  📵 Offline — showing local results only
                </div>
              )}
            </div>
          )}
          {query.length > 1 && !pickedUSDA && localSuggestions.length === 0 && !showSuggestions && (
            <button onClick={()=>{ setShowSuggestions(false); setForm(f=>({...f,name:query,cal:'',protein:'',carbs:'',fat:''})); }}
              style={{width:'100%',marginTop:8,padding:'10px 14px',background:'#111',border:'1px dashed #3d3d3d',
              borderRadius:12,color:'#a0a0a0',fontSize:13,cursor:'pointer',textAlign:'left'}}>
              ✏️ Can't find "{query}"? Add it manually →
            </button>
          )}
        </div>

        {/* USDA serving size adjuster */}
        {pickedUSDA && (
          <div className="rounded-2xl p-3 mb-3" style={{background:'rgba(56,189,248,0.08)',border:'1px solid rgba(56,189,248,0.25)'}}>
            <p className="text-xs font-semibold mb-2" style={{color:'#38bdf8'}}>🔵 USDA data · adjust serving size:</p>
            <div className="flex gap-2 flex-wrap mb-2">
              {[50,75,100,150,200,250].map(g=>(
                <button key={g} onClick={()=>updateServing(g)}
                  className="px-3 py-1.5 rounded-xl text-xs font-bold transition-all"
                  style={{background:servingG===g?'#38bdf8':'var(--card)',
                    color:servingG===g?'#fff':'var(--text2)',
                    border:`1px solid ${servingG===g?'#38bdf8':'var(--border2)'}`}}>
                  {g}g
                </button>
              ))}
            </div>
            <p className="text-xs" style={{color:'var(--text3)'}}>Values scale automatically with serving size</p>
          </div>
        )}

        {/* Nutrition display */}
        {form.name && form.cal && (
          <div className="rounded-2xl p-3 mb-3" style={{background:'rgba(34,197,94,0.08)',border:'1px solid rgba(34,197,94,0.2)'}}>
            <div className="flex items-center justify-between mb-2">
              <p className="text-xs font-semibold" style={{color:'#22c55e'}}>
                {pickedUSDA ? `✓ USDA · ${servingG}g serving` : '✓ Nutrition auto-filled'}
              </p>
              <p className="text-xs" style={{color:'var(--text3)'}}>Tap values to edit</p>
            </div>
            <div className="grid grid-cols-4 gap-1.5">
              {[['cal','Calories','kcal','#f59e0b'],['protein','Protein','g','#22c55e'],['carbs','Carbs','g','#38bdf8'],['fat','Fat','g','#fb923c']].map(([k,l,u,c])=>(
                <div key={k} className="rounded-xl p-2 text-center" style={{background:'var(--card)'}}>
                  <input type="number" value={form[k]} onChange={e=>up(k,e.target.value)}
                    className="w-full text-center text-sm font-bold bg-transparent border-none outline-none"
                    style={{color:c}}/>
                  <p className="text-xs" style={{color:'var(--text3)'}}>{l}<br/><span style={{fontSize:9}}>{u}</span></p>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Manual entry when name typed but no match */}
        {form.name && !form.cal && (
          <div className="rounded-2xl p-3 mb-3" style={{background:'rgba(251,146,60,0.08)',border:'1px solid rgba(251,146,60,0.2)'}}>
            <p className="text-xs font-semibold mb-2" style={{color:'#fb923c'}}>Enter nutrition manually:</p>
            <div className="grid grid-cols-2 gap-2">
              {[['cal','Calories (kcal)','450'],['protein','Protein (g)','20'],['carbs','Carbs (g)','50'],['fat','Fat (g)','15']].map(([k,l,p])=>(
                <div key={k}>
                  <label className="text-xs mb-1 block" style={{color:'var(--text2)'}}>{l}</label>
                  <input className="input-field text-sm py-2" type="number" placeholder={p} value={form[k]} onChange={e=>up(k,e.target.value)}/>
                </div>
              ))}
            </div>
          </div>
        )}

        {!form.name && query.length < 2 && (
          <div className="rounded-2xl p-4 mb-3 text-center" style={{background:'var(--card)',border:'1px solid var(--border)'}}>
            <p className="text-2xl mb-2">🔍</p>
            <p className="text-sm font-semibold" style={{color:'var(--text)'}}>Search 250+ foods</p>
            <p className="text-xs mt-1" style={{color:'var(--text3)'}}>Indian staples · International · Raw ingredients · Snacks</p>
            <p className="text-xs mt-1" style={{color:'#38bdf8'}}>+ Live search from USDA database (millions of foods)</p>
          </div>
        )}

        {form.name && (
          <div>
            <div className="mb-3">
              <label className="text-xs mb-1 block font-semibold" style={{color:'var(--text2)'}}>Meal type</label>
              <select className="input-field" value={form.type} onChange={e=>up('type',e.target.value)}>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="snack">Snack</option>
                <option value="dinner">Dinner</option>
              </select>
            </div>
            <button className="btn btn-primary w-full" onClick={save} disabled={!form.cal}>Log This Meal</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Exercise Log Modal ────────────────────────────────────────────────────
function ExerciseLogModal({ exercise, pb, onSave, onClose }) {
  const isTimeBased = /plank|wall sit|hold|dead hang|static/i.test(exercise);
  const isCardioMachine = /treadmill|stationary bike|elliptical|stair|rowing machine/i.test(exercise);
  const isCardioFree = /run|sprint|jump rope|walk|hike|cycle/i.test(exercise);
  const isCardio = isCardioMachine || isCardioFree;

  // Time-based state
  const [duration, setDuration] = useState('');
  const [distance, setDistance] = useState('');
  // Strength state
  const [sets, setSets] = useState([{ weight:'', reps:'' }]);
  const [show1rm, setShow1rm] = useState(false);

  const addSet = () => setSets(s=>[...s, { weight:'', reps:'' }]);
  const updateSet = (i,k,v) => setSets(s=>s.map((x,j)=>j===i?{...x,[k]:v}:x));
  const removeSet = (i) => setSets(s=>s.filter((_,j)=>j!==i));
  const epley = (w,r) => (+w===0||+r===0) ? 0 : r===1 ? +w : +(+w*(1+(+r)/30)).toFixed(1);
  const validSets = sets.filter(s=>+s.reps>0&&s.reps!=='');
  const bestSet = validSets.length ? validSets.reduce((b,s)=>epley(+s.weight,+s.reps)>epley(+b.weight,+b.reps)?s:b) : null;
  const e1rm = bestSet ? epley(+bestSet.weight,+bestSet.reps) : 0;
  const isNewPB = bestSet && pb && e1rm > 0 && e1rm > pb.e1rm;
  const isBW = (s) => s.weight==='' || s.weight==='0' || +s.weight===0;

  const save = () => {
    if (isTimeBased || isCardio) {
      if (!duration) return;
      const bw = { weight: +distance || 0, reps: +duration };
      onSave(exercise, [bw], bw, 0);
    } else {
      if (!validSets.length) return;
      const bw = { ...bestSet, weight: isBW(bestSet)?0:+bestSet.weight };
      onSave(exercise, validSets, bw, e1rm);
    }
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxHeight:'88vh',overflowY:'auto'}}>
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-sm font-bold text-white">
            {isTimeBased ? '⏱️' : isCardio ? '🏃' : '🏋️'} {exercise}
          </h3>
          <button className="text-slate-400 text-xl leading-none" onClick={onClose}>×</button>
        </div>

        {/* Time-based */}
        {isTimeBased && (
          <div className="mb-4">
            <label className="text-xs text-slate-400 mb-2 block font-semibold">Hold time (seconds)</label>
            <input className="input-field text-center text-2xl font-bold" type="number" placeholder="e.g. 60" value={duration} onChange={e=>setDuration(e.target.value)}/>
            <div className="flex gap-2 mt-2 flex-wrap">
              {[20,30,45,60,90,120].map(s=>(
                <button key={s} className="px-3 py-1.5 rounded-lg text-xs font-semibold"
                  style={{background:duration===String(s)?'#ffffff':'#1a1a1a',color:duration===String(s)?'#000000':'#a0a0a0',border:'1px solid #3d3d3d'}}
                  onClick={()=>setDuration(String(s))}>{s}s</button>
              ))}
            </div>
          </div>
        )}

        {/* Cardio */}
        {isCardio && (
          <div className="mb-4 space-y-3">
            <div>
              <label className="text-xs text-slate-400 mb-2 block font-semibold">Duration (minutes)</label>
              <input className="input-field text-center text-xl font-bold" type="number" placeholder="e.g. 30" value={duration} onChange={e=>setDuration(e.target.value)}/>
              <div className="flex gap-2 mt-2 flex-wrap">
                {[10,15,20,30,45,60].map(d=>(
                  <button key={d} className="px-3 py-1.5 rounded-lg text-xs font-semibold"
                    style={{background:duration===String(d)?'#ffffff':'#1a1a1a',color:duration===String(d)?'#000000':'#a0a0a0',border:'1px solid #3d3d3d'}}
                    onClick={()=>setDuration(String(d))}>{d}m</button>
                ))}
              </div>
            </div>
            <div>
              <label className="text-xs text-slate-400 mb-1 block font-semibold">Distance (km) — optional</label>
              <input className="input-field" type="number" step="0.1" placeholder="e.g. 5.2" value={distance} onChange={e=>setDistance(e.target.value)}/>
            </div>
          </div>
        )}

        {/* Strength */}
        {!isTimeBased && !isCardio && (
          <>
            {pb && (
              <div className="rounded-xl p-3 mb-3" style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.15)'}}>
                <p className="text-xs text-slate-400">Personal Best</p>
                <p className="text-sm font-bold text-white">{pb.weight>0?`${pb.weight}kg`:'Bodyweight'} × {pb.reps} reps</p>
              </div>
            )}
            <button className="flex items-center gap-1 mb-3 text-xs text-slate-500" onClick={()=>setShow1rm(s=>!s)}>
              <span className="underline decoration-dotted">What is 1RM?</span> {show1rm?'▲':'▼'}
            </button>
            {show1rm && (
              <div className="rounded-xl p-3 mb-3" style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)'}}>
                <p className="text-xs text-white font-semibold mb-1">1RM = 1 Rep Maximum</p>
                <p className="text-xs text-slate-400 leading-relaxed">The maximum weight you could lift for exactly 1 rep. Calculated using the Epley formula: weight × (1 + reps ÷ 30).</p>
              </div>
            )}
            <div className="mb-3">
              <div className="grid grid-cols-3 gap-2 mb-2 px-1">
                <p className="text-xs text-slate-500 font-semibold">Set</p>
                <p className="text-xs text-slate-500 font-semibold">Weight (kg)</p>
                <p className="text-xs text-slate-500 font-semibold">Reps</p>
              </div>
              {sets.map((s,i)=>(
                <div key={i} className="grid grid-cols-3 gap-2 mb-2 items-center">
                  <div className="flex items-center gap-1">
                    <span className="text-sm text-slate-300 font-bold">{i+1}</span>
                    {sets.length>1 && <button className="text-red-500 text-xs ml-1" onClick={()=>removeSet(i)}>✕</button>}
                  </div>
                  <input className="input-field text-sm text-center" type="number" placeholder="kg / 0=BW"
                    value={s.weight} onChange={e=>updateSet(i,'weight',e.target.value)}/>
                  <input className="input-field text-sm text-center" type="number" placeholder="reps"
                    value={s.reps} onChange={e=>updateSet(i,'reps',e.target.value)}/>
                </div>
              ))}
              <button className="text-slate-400 text-sm font-semibold mt-1" onClick={addSet}>+ Add Set</button>
            </div>
            {isNewPB && <div className="rounded-xl p-3 mb-3" style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.2)'}}>
              <p className="text-sm font-bold text-white">🏆 New Personal Best!</p>
              <p className="text-xs text-slate-400">Estimated 1RM: {e1rm}kg</p>
            </div>}
          </>
        )}

        <button className="btn btn-primary w-full mt-2" onClick={save}
          disabled={isTimeBased||isCardio ? !duration : !validSets.length}>
          Save {isTimeBased ? 'Hold' : isCardio ? 'Session' : 'Sets'}
        </button>
      </div>
    </div>
  );
}

  { name:'Running',           icon:'🏃', met:9    },
  { name:'Cycling',           icon:'🚴', met:7.5  },
  { name:'Swimming',          icon:'🏊', met:8    },
  { name:'Football',          icon:'⚽', met:10   },
  { name:'Basketball',        icon:'🏀', met:8    },
  { name:'Cricket',           icon:'🏏', met:5    },
  { name:'Badminton',         icon:'🏸', met:5.5  },

];

function CustomActivityModal({ onSave, onClose }) {
  const [picked, setPicked] = useState(null);
  const [duration, setDuration] = useState('');
  const [customName, setCustomName] = useState('');

  const act = picked !== null ? ACTIVITY_TYPES[picked] : null;
  const name = act?.name === 'Other' ? customName : act?.name || '';
  const kcalBurned = act && duration ? Math.round(act.met * +duration) : 0;

  const save = () => {
    if (!act || !duration || (act.name==='Other' && !customName)) return;
    onSave({ name, duration:+duration, intensity:'moderate', kcalBurned, id:Date.now() });
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxHeight:'88vh',overflowY:'auto'}}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-base font-bold text-white">🏃 Log Activity</h3>
          <button className="text-slate-400 text-xl leading-none" onClick={onClose}>×</button>
        </div>
        {/* Step 1: pick activity type */}
        <p className="text-xs text-slate-400 mb-2 font-semibold">1. What did you do?</p>
        <div className="grid grid-cols-3 gap-2 mb-4">
          {ACTIVITY_TYPES.map((a,i)=>(
            <button key={a.name} onClick={()=>setPicked(i)}
              className="rounded-xl py-2 px-1 text-center transition-all"
              style={{
                background: picked===i ? 'rgba(255,255,255,0.2)' : '#1a1a1a',
                border: picked===i ? '1px solid #ffffff' : '1px solid #3d3d3d',
              }}>
              <div className="text-xl mb-0.5">{a.icon}</div>
              <p className="text-xs text-white leading-tight">{a.name}</p>
            </button>
          ))}
        </div>
        {act?.name === 'Other' && (
          <div className="mb-3">
            <label className="text-xs text-slate-400 mb-1 block">Activity name *</label>
            <input className="input-field" placeholder="e.g. Martial arts, Tennis..." value={customName} onChange={e=>setCustomName(e.target.value)}/>
          </div>
        )}
        {/* Step 2: duration */}
        {act && (
          <div className="mb-4">
            <p className="text-xs text-slate-400 mb-2 font-semibold">2. How long? (minutes)</p>
            <div className="flex gap-2 mb-2 flex-wrap">
              {[15,20,30,45,60,90].map(d=>(
                <button key={d} onClick={()=>setDuration(String(d))}
                  className="px-3 py-1.5 rounded-lg text-sm font-semibold transition-all"
                  style={{background:duration===String(d)?'#ffffff':'#1a1a1a',color:duration===String(d)?'#000000':'#94a3b8',
                    border:`1px solid ${duration===String(d)?'#ffffff':'#3d3d3d'}`}}>
                  {d}m
                </button>
              ))}
            </div>
            <input className="input-field text-sm" type="number" placeholder="Or enter custom minutes..."
              value={duration} onChange={e=>setDuration(e.target.value)}/>
          </div>
        )}
        {kcalBurned > 0 && (
          <div className="rounded-xl p-3 mb-4" style={{background:'rgba(251,146,60,0.08)',border:'1px solid rgba(251,146,60,0.2)'}}>
            <p className="text-sm text-orange-400">Estimated burn: <span className="font-bold text-orange-300 text-base">{kcalBurned} kcal</span></p>
          </div>
        )}
        <button className="btn btn-primary w-full" onClick={save}
          disabled={!act||!duration||(act.name==='Other'&&!customName)}>
          Log Activity
        </button>
      </div>
    </div>
  );
}

// ── Workout Exercise Row (shared) ────────────────────────────────────────
function ExerciseRow({ ex, secTitle, workoutHistory, pbs, onLog, showSets=true }) {
  const isMain = !/warm|cardio|finisher|recovery/i.test(secTitle||'');
  const loggedToday = isMain ? (workoutHistory||[]).find(h=>h.exercise===ex.name&&h.date===TODAY_KEY) : null;
  const last = isMain ? (workoutHistory||[]).filter(h=>h.exercise===ex.name&&h.date!==TODAY_KEY).slice(-1)[0] : null;
  const suggest = last && +last.bestSet.weight>0 ? +(+last.bestSet.weight+2.5).toFixed(1) : 0;
  return (
    <div className="exercise-row">
      <div className="flex items-start gap-3">
        {/* Exercise illustration */}
        {ex.mv && EXERCISE_SVG[ex.mv] && (
          <div style={{width:58,height:58,flexShrink:0,background:'rgba(255,255,255,0.04)',
            border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,
            display:'flex',alignItems:'center',justifyContent:'center',padding:4}}
            dangerouslySetInnerHTML={{__html:EXERCISE_SVG[ex.mv]}}/>
        )}
        <div className="flex-1 min-w-0">
      <div className="flex items-start justify-between">
        <div className="flex-1">
          <div className="flex items-center gap-2 flex-wrap mb-0.5">
            <p className="font-semibold text-white text-sm">{ex.name}</p>
            {ex.equip && (
              <span className="text-xs px-1.5 py-0.5 rounded-md font-medium"
                style={{
                  background: 'rgba(255,255,255,0.07)',
                  color: '#c0c0c0',
                }}>
                {ex.equip==='BW'?'Bodyweight':ex.equip==='Cable'?'Cable/Rope':ex.equip==='Machine'?'Machine':ex.equip==='BB'?'Barbell':'Dumbbell'}
              </span>
            )}
          </div>
          {ex.note && <p className="text-xs text-slate-500 mt-0.5">{ex.note}</p>}
          {loggedToday && (
            <p className="text-xs text-green-400 mt-1">✓ Logged: {loggedToday.bestSet.weight>0?`${loggedToday.bestSet.weight}kg × `:'BW × '}{loggedToday.bestSet.reps} reps</p>
          )}
          {!loggedToday && last && (
            <p className="text-xs mt-1" style={{color:'#ffffff'}}>🎯 Last: {last.bestSet.weight>0?`${last.bestSet.weight}kg`:'BW'} × {last.bestSet.reps} reps{suggest>0?` → try ${suggest}kg`:''}</p>
          )}
        </div>
        <div className="flex items-center gap-2 ml-2 shrink-0">
          {showSets && ex.sets > 1 && <span className="text-xs text-slate-500">{ex.sets}×{ex.reps}</span>}
          {showSets && ex.sets <= 1 && <span className="text-xs text-slate-500">{ex.reps}</span>}
          {isMain && (
            <button className="text-xs px-2 py-1 rounded-lg font-semibold"
              style={{background:'rgba(255,255,255,0.15)',color:'#ffffff',border:'1px solid rgba(255,255,255,0.3)'}}
              onClick={()=>onLog(ex.name)}>
              {loggedToday ? '✓' : 'Log'}
            </button>
          )}
        </div>
      </div>
        </div>{/* end flex-1 content wrapper */}
      </div>{/* end outer flex with SVG */}
    </div>
  );
}

// ── Weekly View ───────────────────────────────────────────────────────────
function WeeklyView({ profile }) {
  const today = new Date();
  const [expanded, setExpanded] = useState(today.getDay()); // today expanded by default
  const weekDays = Array.from({length:7},(_,i) => {
    const d = new Date(today);
    d.setDate(today.getDate() - today.getDay() + i);
    return d;
  });

  return (
    <div className="fade-in pb-24 px-5 pt-5">
      <h1 className="text-xl font-bold text-white mb-1">Weekly Plan</h1>
      <p className="text-xs text-slate-400 mb-4">Tap any day for full workout & meal details</p>
      {weekDays.map((d, i) => {
        const isToday = i === today.getDay();
        const dayIdx = d.getDay();
        const wType = WORKOUT_SCHEDULE[dayIdx];
        const workout = WORKOUTS[wType];
        const dayName = DAY_NAMES[dayIdx].toLowerCase();
        const isFootball = profile.sportsDays?.includes(dayName) && (profile.sportsPlayed||[]).length > 0;
        const bfast = MEALS.breakfast[i % MEALS.breakfast.length];
        const lunch = MEALS.lunch[i % MEALS.lunch.length];
        const snack = MEALS.snack[i % MEALS.snack.length];
        const dinner = MEALS.dinner[i % MEALS.dinner.length];
        const targets = calcTargets(profile, isFootball ? 'football' : wType === 'rest' ? 'rest' : wType === 'active' ? 'active' : 'gym');
        const isOpen = expanded === i;
        return (
          <div key={i} className="rounded-2xl mb-3 overflow-hidden"
            style={{ border: `1px solid ${isToday ? '#ffffff' : 'var(--border)'}` }}>
            {/* Header row — always visible */}
            <button className="w-full flex items-center justify-between p-4 text-left"
              style={{background: isToday ? 'rgba(255,255,255,0.12)' : 'var(--bg2)'}}
              onClick={()=>setExpanded(isOpen ? -1 : i)}>
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl flex items-center justify-center font-bold text-sm shrink-0"
                  style={{background: isToday ? '#ffffff' : 'var(--card)', color: isToday ? '#fff' : 'var(--text2)'}}>
                  {d.getDate()}
                </div>
                <div>
                  <p className="font-bold text-sm text-white">{DAY_NAMES[dayIdx]}{isToday ? ' · Today' : ''}</p>
                  <p className="text-xs" style={{color:workout.color}}>{workout.icon} {workout.name}</p>
                </div>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-right shrink-0">
                  <p className="text-xs text-slate-400 font-semibold">{targets.calories} kcal</p>
                  <p className="text-xs text-slate-500">{targets.protein}g P</p>
                </div>
                <span className="text-slate-400">{isOpen ? '▲' : '▼'}</span>
              </div>
            </button>

            {/* Expanded details */}
            {isOpen && (
              <div className="px-4 pb-4 fade-in" style={{background:'var(--bg3)'}}>
                {/* Macro targets */}
                <div className="grid grid-cols-4 gap-2 py-3 border-b" style={{borderColor:'var(--border)'}}>
                  {[['Calories',targets.calories,'kcal','#f59e0b'],['Protein',targets.protein,'g','#22c55e'],['Carbs',targets.carbs,'g','#38bdf8'],['Fat',targets.fat,'g','#fb923c']].map(([l,v,u,c])=>(
                    <div key={l} className="text-center">
                      <p className="text-sm font-bold" style={{color:c}}>{v}<span className="text-xs">{u}</span></p>
                      <p className="text-xs text-slate-500">{l}</p>
                    </div>
                  ))}
                </div>

                {/* Meals */}
                <p className="text-xs font-bold text-slate-400 mt-3 mb-2">🍽️ MEALS</p>
                {[
                  {label:'Breakfast',m:bfast},
                  {label:'Lunch',m:lunch},
                  {label:'Snack',m:snack},
                  {label:'Dinner',m:dinner}
                ].map(({label,m})=>(
                  <div key={label} className="flex items-start gap-2 mb-2">
                    <span className="text-lg shrink-0">{m.emoji}</span>
                    <div className="flex-1 min-w-0">
                      <p className="text-xs text-slate-400">{label}</p>
                      <p className="text-sm font-semibold text-white truncate">{m.name}</p>
                      <p className="text-xs text-slate-500">{m.cal} kcal · P:{m.protein}g · C:{m.carbs}g · F:{m.fat}g</p>
                    </div>
                  </div>
                ))}

                {/* Workout exercises */}
                <p className="text-xs font-bold text-slate-400 mt-3 mb-2">💪 WORKOUT</p>
                {workout.sections.filter(s=>!/warm|cardio|finisher|recovery/i.test(s.title)).map((sec,si)=>(
                  <div key={si} className="mb-2">
                    <p className="text-xs text-slate-500 font-semibold mb-1">{sec.title}</p>
                    {sec.exercises.map((ex,ei)=>(
                      <div key={ei} className="flex items-center justify-between py-1">
                        <p className="text-sm text-white flex-1">{ex.name}</p>
                        <p className="text-xs text-slate-400 shrink-0 ml-2">{ex.sets > 1 ? `${ex.sets}×` : ''}{ex.reps}</p>
                      </div>
                    ))}
                  </div>
                ))}
                {isFootball && (
                  <p className="text-xs text-green-400 mt-2">⚽ Sports at {profile.sportsTime||'—'}{profile.sportsTime ? ` — pre-match snack by ${subtractMins(profile.sportsTime, 90)}` : ''}</p>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
