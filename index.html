            <button className="btn btn-secondary px-4 py-2" onClick={()=>setQty(q=>Math.max(0.5,+(q-0.5).toFixed(1)))}>−</button>
            <p className="text-xl font-bold text-white w-12 text-center">{qty}</p>
            <button className="btn btn-primary px-4 py-2" onClick={()=>setQty(q=>+(q+0.5).toFixed(1))}>+</button>
          </div>
        </div>
        {/* Summary */}
        <div className="rounded-xl p-3 mb-4" style={{background:'rgba(251,146,60,0.08)',border:'1px solid rgba(251,146,60,0.25)'}}>
          <p className="text-sm text-white font-semibold">{qty}× {selected.name}</p>
          <p className="text-xs text-slate-400 mt-0.5">{totalMl}ml total · <span className="text-orange-300 font-bold">{totalKcal} kcal</span></p>
        </div>
        <button className="btn btn-primary w-full" onClick={save}>Log This Drink</button>
      </div>
    </div>
  );
}

// ── History Calendar Modal ────────────────────────────────────────────────
function HistoryModal({ workoutHistory, onClose }) {
  const today = new Date();
  const [viewDate, setViewDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selectedDay, setSelectedDay] = useState(null);

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDOW = new Date(year, month, 1).getDay();
  const monthName = viewDate.toLocaleString('default',{month:'long',year:'numeric'});

  const prevMonth = () => setViewDate(d => new Date(d.getFullYear(), d.getMonth()-1, 1));
  const nextMonth = () => setViewDate(d => new Date(d.getFullYear(), d.getMonth()+1, 1));

  const keyForDay = (day) => {
    const d = new Date(year, month, day);
    return d.toISOString().slice(0,10);
  };

  const workoutsOnDay = (dk) => (workoutHistory||[]).filter(h=>h.date===dk);
  const progressOnDay = (dk) => {
    try { const log = JSON.parse(localStorage.getItem('fitfuel_progress')||'[]'); return log.find(l=>l.date===dk); } catch { return null; }
  };
  const activitiesOnDay = (dk) => {
    try { return JSON.parse(localStorage.getItem(`fitfuel_acts_${dk}`)||'[]'); } catch { return []; }
  };
  const mealsOnDay = (dk) => {
    try { return JSON.parse(localStorage.getItem(`fitfuel_eaten_${dk}`)||'{}'); } catch { return {}; }
  };
  const customMealsOnDay = (dk) => {
    try { return JSON.parse(localStorage.getItem(`fitfuel_custom_${dk}`)||'[]'); } catch { return []; }
  };

  const selKey = selectedDay ? keyForDay(selectedDay) : null;
  const selWorkouts = selKey ? workoutsOnDay(selKey) : [];
  const selProgress = selKey ? progressOnDay(selKey) : null;
  const selActivities = selKey ? activitiesOnDay(selKey) : [];
  const selMeals = selKey ? mealsOnDay(selKey) : {};
  const selCustom = selKey ? customMealsOnDay(selKey) : [];
  const todayKey = toDateKey(new Date());

  const hasDot = (day) => {
    const dk = keyForDay(day);
    return workoutsOnDay(dk).length > 0 || progressOnDay(dk) || activitiesOnDay(dk).length > 0;
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:'92dvh'}}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-base font-bold text-white">📅 Workout & Meal History</h3>
          <button className="text-slate-400 text-xl" onClick={onClose}>×</button>
        </div>
        {/* Month nav */}
        <div className="flex items-center justify-between mb-3">
          <button onClick={prevMonth} className="text-slate-400 text-lg px-2">‹</button>
          <p className="text-sm font-bold text-white">{monthName}</p>
          <button onClick={nextMonth} className="text-slate-400 text-lg px-2">›</button>
        </div>
        {/* Day-of-week labels */}
        <div className="grid grid-cols-7 mb-1">
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>(
            <p key={d} className="text-center text-xs text-slate-500 font-semibold py-1">{d}</p>
          ))}
        </div>
        {/* Calendar grid */}
        <div className="grid grid-cols-7 gap-1 mb-4">
          {Array.from({length:firstDOW}).map((_,i)=><div key={'e'+i}/>)}
          {Array.from({length:daysInMonth}).map((_,i)=>{
            const day = i+1;
            const dk = keyForDay(day);
            const isToday = dk === todayKey;
            const isSel = selectedDay === day;
            const hasData = hasDot(day);
            return (
              <button key={day} onClick={()=>setSelectedDay(isSel?null:day)}
                className="aspect-square rounded-xl flex flex-col items-center justify-center text-sm font-semibold transition-all"
                style={{
                  background: isSel ? '#ffffff' : isToday ? 'rgba(255,255,255,0.12)' : 'transparent',
                  color: isSel ? '#000000' : isToday ? '#ffffff' : 'var(--text)',
                  border: isToday && !isSel ? '1px solid rgba(255,255,255,0.4)' : '1px solid transparent',
                }}>
                {day}
                {hasData && <div className="w-1 h-1 rounded-full mt-0.5" style={{background:'#ffffff'}}/>}
              </button>
            );
          })}
        </div>
        {/* Selected day detail */}
        {selectedDay && (
          <div className="rounded-2xl p-4" style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.2)'}}>
            <p className="text-sm font-bold text-white mb-3">
              {new Date(year,month,selectedDay).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'})}
            </p>
            {selProgress && (
              <div className="mb-2">
                <p className="text-xs text-slate-400 font-semibold mb-1">Body Measurements</p>
                <p className="text-sm text-white">{selProgress.weight} kg · {selProgress.bf}% BF</p>
              </div>
            )}
            {selWorkouts.length > 0 && (
              <div className="mb-2">
                <p className="text-xs text-slate-400 font-semibold mb-1">Strength Work ({selWorkouts.length} exercises)</p>
                {selWorkouts.map((w,i)=>(
                  <p key={i} className="text-xs text-white">
                    {w.exercise}: {w.bestSet?.weight>0?`${w.bestSet.weight}kg`:'BW'} × {w.bestSet?.reps} reps
                    {w.e1rm>0 && <span className="text-cyan-400"> ({w.e1rm}kg 1RM)</span>}
                  </p>
                ))}
              </div>
            )}
            {selActivities.length > 0 && (
              <div className="mb-2">
                <p className="text-xs text-slate-400 font-semibold mb-1">Extra Activities</p>
                {selActivities.map((a,i)=>(
                  <p key={i} className="text-xs text-white">{a.name} · {a.duration}min · −{a.kcalBurned} kcal</p>
                ))}
              </div>
            )}
            {(Object.keys(selMeals).filter(k=>selMeals[k]).length > 0 || selCustom.length > 0) && (
              <div>
                <p className="text-xs text-slate-400 font-semibold mb-1">Meals Logged</p>
                {Object.entries(selMeals).filter(([,v])=>v).map(([k,m])=>(
                  <p key={k} className="text-xs text-white capitalize">{k}: {m.name} ({m.cal} kcal)</p>
                ))}
                {selCustom.map((m,i)=>(
                  <p key={i} className="text-xs text-white">{m.name} ({m.cal} kcal)</p>
                ))}
              </div>
            )}
            {!selProgress && !selWorkouts.length && !selActivities.length && Object.keys(selMeals).filter(k=>selMeals[k]).length===0 && selCustom.length===0 && (
              <p className="text-xs text-slate-500 italic">Nothing logged on this day.</p>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Body Fat Calculator ───────────────────────────────────────────────────
function BodyFatCalculator({ profile, onUpdate, showToast }) {
  const [waist, setWaist] = useState('');
  const [neck, setNeck] = useState('');
  const [hip, setHip] = useState('');
  const [heightCm, setHeightCm] = useState(profile.height || '');
  const [result, setResult] = useState(null);

  const calc = () => {
    const w = +waist, n = +neck, h = +hip, ht = +heightCm;
    if (!w || !n || !ht) return;
    let bf;
    if (profile.gender === 'female') {
      if (!h) return;
      bf = 495 / (1.29579 - 0.35004 * Math.log10(w + h - n) + 0.22100 * Math.log10(ht)) - 450;
    } else {
      bf = 495 / (1.0324 - 0.19077 * Math.log10(w - n) + 0.15456 * Math.log10(ht)) - 450;
    }
    setResult(Math.max(3, Math.min(60, +bf.toFixed(1))));
  };

  const useResult = () => {
    onUpdate({ ...profile, bodyFat: result });
    showToast(`✓ Body fat updated to ${result}%`);
  };

  return (
    <div className="gradient-card rounded-2xl p-4 mb-4">
      <p className="text-sm font-bold text-white mb-1">📐 Body Fat Calculator</p>
      <p className="text-xs text-slate-400 mb-3">Navy Method — measure in cm at the widest point</p>
      <div className="grid grid-cols-2 gap-3 mb-3">
        <div>
          <label className="text-xs text-slate-400 mb-1 block">Waist (cm)</label>
          <input className="input-field text-sm" type="number" placeholder="e.g. 85" value={waist} onChange={e=>setWaist(e.target.value)}/>
        </div>
        <div>
          <label className="text-xs text-slate-400 mb-1 block">Neck (cm)</label>
          <input className="input-field text-sm" type="number" placeholder="e.g. 38" value={neck} onChange={e=>setNeck(e.target.value)}/>
        </div>
        {profile.gender === 'female' && (
          <div>
            <label className="text-xs text-slate-400 mb-1 block">Hip (cm)</label>
            <input className="input-field text-sm" type="number" placeholder="e.g. 95" value={hip} onChange={e=>setHip(e.target.value)}/>
          </div>
        )}
        <div>
          <label className="text-xs text-slate-400 mb-1 block">Height (cm)</label>
          <input className="input-field text-sm" type="number" placeholder="e.g. 175" value={heightCm} onChange={e=>setHeightCm(e.target.value)}/>
        </div>
      </div>
      <button className="btn btn-primary w-full mb-3" onClick={calc}>Calculate Body Fat %</button>
      {result !== null && (
        <div className="rounded-xl p-3" style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.15)'}}>
          <p className="text-xs text-slate-400">Your estimated body fat</p>
          <p className="text-3xl font-bold text-white mt-1">{result}%
            <span className="text-sm font-normal text-slate-400 ml-2">
              {result < 10 ? 'Essential fat' : result < 20 ? 'Athletic' : result < 25 ? 'Fitness' : result < 32 ? 'Average' : 'Obese'}
            </span>
          </p>
          <button className="btn btn-secondary text-xs mt-2 w-full" onClick={useResult}>Use this result → update profile</button>
        </div>
      )}
    </div>
  );
}

// ── Progress View ─────────────────────────────────────────────────────────
function ProgressView({ profile, onUpdateProfile, pbs, workoutHistory, showToast }) {
  const [log, setLog] = useState(() => ls.get('fitfuel_progress', []));
  const [weight, setWeight] = useState(profile.weight);
  const [bf, setBf] = useState(profile.bodyFat);
  const [alcoholLog, setAlcoholLog] = useState(() => ls.get('fitfuel_alcohol', []));
  const [showAlcohol, setShowAlcohol] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const [progressTab, setProgressTab] = useState('body');

  const addEntry = () => {
    const newW = +weight, newBf = +bf;
    const entry = { date: TODAY_KEY, weight: newW, bf: newBf };
    const updated = [...log.filter(l=>l.date!==TODAY_KEY), entry].sort((a,b)=>a.date.localeCompare(b.date));
    setLog(updated);
    ls.set('fitfuel_progress', updated);
    const oldCal = calcTargets(profile, getDayType(profile, TODAY_IDX)).calories;
    const newProfile = { ...profile, weight: newW, bodyFat: newBf };
    const newCal = calcTargets(newProfile, getDayType(newProfile, TODAY_IDX)).calories;
    onUpdateProfile(newProfile);
    const diff = newCal - oldCal;
    const wDiff = +(profile.weight - newW).toFixed(1);
    let msg = '✓ Progress saved!';
    if (Math.abs(diff) >= 5) msg += ` Calorie target ${diff > 0 ? 'up' : 'down'} to ${newCal} kcal`;
    if (Math.abs(wDiff) >= 0.1) msg += ` · Weight ${wDiff > 0 ? '−' : '+'}${Math.abs(wDiff)}kg`;
    showToast(msg);
  };

  const logAlcohol = (entry) => {
    const updated = [...alcoholLog, entry];
    setAlcoholLog(updated);
    ls.set('fitfuel_alcohol', updated);
  };

  const removeAlcohol = (id) => {
    const updated = alcoholLog.filter(a=>a.id!==id);
    setAlcoholLog(updated);
    ls.set('fitfuel_alcohol', updated);
  };

  const leanMass = (+profile.weight||0) * (1 - (+profile.bodyFat||0)/100);
  const targetWeight = profile.targetBodyFat ? (leanMass / (1 - (+profile.targetBodyFat)/100)).toFixed(1) : '—';
  const fatToLose = profile.targetBodyFat ? (+profile.weight - +targetWeight).toFixed(1) : '—';

  const recent = log.slice(-8);
  const maxW = recent.length ? Math.max(...recent.map(l=>l.weight)) + 1 : (+profile.weight||70) + 5;
  const minW = recent.length ? Math.min(...recent.map(l=>l.weight)) - 1 : (+profile.weight||70) - 5;

  // Helper: last 7 days date keys
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-6+i);
    return toDateKey(d);
  });

  return (
    <div className="fade-in pb-24 px-5 pt-5">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-xl font-bold text-white">Progress</h1>
        <button className="text-xs font-semibold px-3 py-2 rounded-xl"
          style={{background:'rgba(255,255,255,0.15)',color:'#ffffff',border:'1px solid rgba(255,255,255,0.3)'}}
          onClick={()=>setShowHistory(true)}>📅 History</button>
      </div>

      {/* Progress Tabs */}
      <div className="flex gap-2 mb-4 overflow-x-auto" style={{scrollbarWidth:'none'}}>
        {[{id:'body',label:'🏋️ Body'},{id:'nutrition',label:'🥗 Nutrition'},{id:'workouts',label:'💪 Workouts'},{id:'sleep',label:'😴 Sleep'}].map(t=>(
          <button key={t.id} onClick={()=>setProgressTab(t.id)}
            className="shrink-0 px-3 py-2 rounded-xl text-xs font-semibold transition-all"
            style={{background:progressTab===t.id?'#ffffff':'var(--card)',
              color:progressTab===t.id?'#000':'var(--text2)',
              border:`1px solid ${progressTab===t.id?'#ffffff':'var(--border2)'}`}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── BODY TAB ── */}
      {progressTab==='body' && (
        <>
          {/* Stats grid */}
          <div className="grid grid-cols-2 gap-3 mb-4">
            {[
              {label:'Current Weight',value:`${profile.weight} kg`,color:'#ffffff'},
              {label:'Target Weight',value:`${targetWeight} kg`,color:'#22c55e'},
              {label:'Current Body Fat',value:`${profile.bodyFat||'—'}%`,color:'#fb923c'},
              {label:'Target Body Fat',value:`${profile.targetBodyFat||'—'}%`,color:'#22c55e'},
              {label:'Fat to Lose',value:`${fatToLose} kg`,color:'#ef4444'},
              {label:'Lean Mass',value:`${leanMass.toFixed(1)} kg`,color:'#38bdf8'},
            ].map(s=>(
              <div key={s.label} className="gradient-card rounded-2xl p-4">
                <p className="text-xs text-slate-500">{s.label}</p>
                <p className="text-xl font-bold mt-1" style={{color:s.color}}>{s.value}</p>
              </div>
            ))}
          </div>

          {/* Body Fat Calculator */}
          <BodyFatCalculator profile={profile} onUpdate={onUpdateProfile} showToast={showToast}/>

          {/* Weight chart */}
          {recent.length > 1 && (
            <div className="gradient-card rounded-2xl p-4 mb-4">
              <div className="flex items-center justify-between mb-3">
                <p className="text-sm font-bold text-slate-300">Weight Trend</p>
                <p className="text-xs text-slate-500">Last {recent.length} entries</p>
              </div>
              {(() => {
                const W = 320, H = 120, padL = 44, padR = 12, padT = 12, padB = 32;
                const gW = W - padL - padR, gH = H - padT - padB;
                const pts = recent.map((l,i)=>({
                  x: padL + (gW/(Math.max(recent.length-1,1)))*i,
                  y: padT + gH - ((l.weight-minW)/(maxW-minW||1))*gH,
                  w: l.weight, d: l.date
                }));
                const path = pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
                const fillPath = path + ` L${pts[pts.length-1].x},${padT+gH} L${pts[0].x},${padT+gH} Z`;
                const ticks = 4;
                return (
                  <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
                    <defs>
                      <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#ffffff" stopOpacity="0.15"/>
                        <stop offset="100%" stopColor="#ffffff" stopOpacity="0"/>
                      </linearGradient>
                    </defs>
                    {Array.from({length:ticks+1}).map((_,i)=>{
                      const y = padT + (gH/ticks)*i;
                      const val = (maxW - (maxW-minW)*(i/ticks)).toFixed(1);
                      return (
                        <g key={i}>
                          <line x1={padL} y1={y} x2={W-padR} y2={y} stroke="var(--border)" strokeWidth="1"/>
                          <text x={padL-4} y={y+4} textAnchor="end" fill="var(--text3)" fontSize="9">{val}</text>
                        </g>
                      );
                    })}
                    <path d={fillPath} fill="url(#wg)"/>
                    <path d={path} fill="none" stroke="#ffffff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                    {pts.map((p,i)=>(
                      <g key={i}>
                        <circle cx={p.x} cy={p.y} r="4" fill="#ffffff" stroke="var(--bg)" strokeWidth="2"/>
                        {(i===0||i===pts.length-1||pts.length<=5) && (
                          <text x={p.x} y={p.y-8} textAnchor="middle" fill="#ffffff" fontSize="9" fontWeight="bold">{p.w}kg</text>
                        )}
                        <text x={p.x} y={H-6} textAnchor="middle" fill="var(--text3)" fontSize="8">{p.d.slice(5)}</text>
                      </g>
                    ))}
                  </svg>
                );
              })()}
              {(() => {
                const diff = +(recent[recent.length-1].weight - recent[0].weight).toFixed(1);
                const arrow = diff < 0 ? '↓' : diff > 0 ? '↑' : '→';
                const col = diff < 0 ? '#22c55e' : diff > 0 ? '#ef4444' : '#94a3b8';
                return <p className="text-xs text-center mt-2" style={{color:col}}>{arrow} {Math.abs(diff)} kg over {recent.length} measurements</p>;
              })()}
            </div>
          )}

          {/* BF chart */}
          {recent.filter(l=>l.bf>0).length > 1 && (()=>{
            const bfPts = recent.filter(l=>l.bf>0);
            const maxBF = Math.max(...bfPts.map(l=>l.bf))+1;
            const minBF = Math.min(...bfPts.map(l=>l.bf))-1;
            const W=320,H=100,padL=40,padR=12,padT=10,padB=28;
            const gW=W-padL-padR,gH=H-padT-padB;
            const pts = bfPts.map((l,i)=>({
              x:padL+(gW/(Math.max(bfPts.length-1,1)))*i,
              y:padT+gH-((l.bf-minBF)/(maxBF-minBF||1))*gH,
              v:l.bf,d:l.date
            }));
            const path=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
            return (
              <div className="gradient-card rounded-2xl p-4 mb-4">
                <p className="text-sm font-bold text-slate-300 mb-3">Body Fat Trend</p>
                <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
                  <path d={path} fill="none" stroke="#fb923c" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  {pts.map((p,i)=>(
                    <g key={i}>
                      <circle cx={p.x} cy={p.y} r="4" fill="#fb923c" stroke="var(--bg)" strokeWidth="2"/>
                      {(i===0||i===pts.length-1) && <text x={p.x} y={p.y-8} textAnchor="middle" fill="#fb923c" fontSize="9" fontWeight="bold">{p.v}%</text>}
                      <text x={p.x} y={H-2} textAnchor="middle" fill="var(--text3)" fontSize="8">{p.d.slice(5)}</text>
                    </g>
                  ))}
                </svg>
              </div>
            );
          })()}

          {/* Log Today */}
          <div className="gradient-card rounded-2xl p-4 mb-4">
            <p className="text-sm font-bold text-slate-300 mb-3">📏 Log Today's Measurements</p>
            <div className="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label className="text-xs text-slate-400 mb-1 block">Weight (kg)</label>
                <input className="input-field" type="number" step="0.1" value={weight}
                  onChange={e=>setWeight(e.target.value)}/>
              </div>
              <div>
                <label className="text-xs text-slate-400 mb-1 block">Body Fat (%)</label>
                <input className="input-field" type="number" step="0.5" value={bf}
                  onChange={e=>setBf(e.target.value)}/>
              </div>
            </div>
            <button className="btn btn-primary w-full" onClick={addEntry}>Save Today's Log</button>
          </div>

          {/* Progress log table */}
          {log.length > 0 && (
            <div className="gradient-card rounded-2xl p-4 mb-4">
              <p className="text-sm font-bold text-slate-300 mb-3">Body Weight History</p>
              {log.slice().reverse().slice(0,10).map(entry=>(
                <div key={entry.date} className="flex items-center justify-between py-2 border-b border-slate-800 last:border-0">
                  <span className="text-xs text-slate-400">{entry.date}</span>
                  <span className="text-xs text-white font-semibold">{entry.weight} kg</span>
                  <span className="text-xs text-orange-400">{entry.bf}% BF</span>
                </div>
              ))}
            </div>
          )}

          {/* Alcohol Log */}
          <div className="gradient-card rounded-2xl p-4 mb-4">
            <div className="flex items-center justify-between mb-2">
              <p className="text-sm font-bold text-slate-300">🍷 Alcohol Log</p>
              <button className="text-xs font-semibold px-3 py-1.5 rounded-xl"
                style={{background:'rgba(251,146,60,0.15)',color:'#fb923c',border:'1px solid rgba(251,146,60,0.3)'}}
                onClick={()=>setShowAlcohol(true)}>+ Log Drink</button>
            </div>
            <p className="text-xs text-slate-500 mb-3">Accurate calories from brands & serving sizes.</p>
            {alcoholLog.filter(a=>a.date===TODAY_KEY).length === 0 ? (
              <p className="text-xs text-slate-600 italic">No drinks logged today.</p>
            ) : (
              <>
                {alcoholLog.filter(a=>a.date===TODAY_KEY).map(a=>(

                  </div>
                ))}

        </>
      )}

      {/* ── NUTRITION TAB ── */}
      {progressTab==='nutrition' && (
        <div>
          <p className="text-sm font-bold text-slate-300 mb-3">🥗 Calorie Intake — Last 7 Days</p>
          {(() => {
            const dayData = last7.map(dateKey => {
              const eaten = ls.get('fitfuel_eaten_'+dateKey, {});
              const custom = ls.get('fitfuel_custom_'+dateKey, []);
              const mealCal = Object.values(eaten).reduce((s,m)=>s+(m?.cal||0),0);
              const customCal = custom.reduce((s,m)=>s+(m.cal||0),0);
              return { date: dateKey, cal: mealCal + customCal };
            });
            const maxCal = Math.max(...dayData.map(d=>d.cal), 1);
            const W=320,H=130,padL=10,padR=10,padT=20,padB=28;
            const gW=W-padL-padR, gH=H-padT-padB;
            const barW = (gW/7)*0.6;
            return (
              <div className="gradient-card rounded-2xl p-4 mb-4">
                <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
                  {dayData.map((d,i)=>{
                    const x = padL + (gW/7)*i + (gW/7)*0.2;
                    const barH = d.cal ? (d.cal/maxCal)*gH : 2;
                    const y = padT+gH-barH;
                    const isToday = d.date===TODAY_KEY;
                    return (
                      <g key={i}>
                        <rect x={x} y={y} width={barW} height={barH} rx="4"
                          fill={isToday?'#ffffff':'#3d3d3d'}/>
                        {d.cal>0 && <text x={x+barW/2} y={y-4} textAnchor="middle" fill={isToday?'#ffffff':'#888'} fontSize="8">{d.cal}</text>}
                        <text x={x+barW/2} y={H-4} textAnchor="middle" fill="var(--text3)" fontSize="8">{d.date.slice(5)}</text>
                      </g>
                    );
                  })}
                </svg>
                <p className="text-xs text-slate-500 text-center mt-1">White bar = today</p>
              </div>
            );
          })()}
          <p className="text-xs text-slate-500 italic">Log meals in the Meals tab to see data here.</p>
        </div>
      )}

      {/* ── WORKOUTS TAB ── */}
      {progressTab==='workouts' && (
        <div>
          {pbs && Object.keys(pbs).length > 0 && (
            <div className="gradient-card rounded-2xl p-4 mb-4">
              <p className="text-sm font-bold text-slate-300 mb-3">🏆 Strength Personal Bests</p>
              {Object.entries(pbs).map(([exName, pb])=>(
                <div key={exName} className="py-2 border-b border-slate-800 last:border-0">

                    <p className="text-xs text-white font-bold">{pb.e1rm} kg est. 1RM</p>
                  </div>
                  <div className="flex items-center gap-3 mt-0.5">
                    <p className="text-xs text-slate-400">{pb.weight}kg × {pb.reps} reps</p>
                    <p className="text-xs text-slate-500">· {pb.date}</p>
                  </div>
                </div>
              ))}
            </div>
          )}
          {workoutHistory && workoutHistory.length > 0 && (
            <div className="gradient-card rounded-2xl p-4 mb-4">
              <p className="text-sm font-bold text-slate-300 mb-3">📈 Recent Lifts</p>
              {workoutHistory.slice(-10).reverse().map((entry,i)=>(
                <div key={i} className="py-2 border-b border-slate-800 last:border-0">
                  <div className="flex items-center justify-between">
                    <p className="text-sm text-white">{entry.exercise}</p>
                    {entry.e1rm > 0 && <p className="text-xs text-green-300">{entry.e1rm} kg 1RM</p>}
                  </div>
                  <p className="text-xs text-slate-500 mt-0.5">
                    {entry.bestSet?.weight > 0 ? `${entry.bestSet.weight}kg` : 'BW'} × {entry.bestSet?.reps} reps · {entry.date}
                  </p>
                </div>
              ))}
            </div>
          )}
          {(!pbs || Object.keys(pbs).length === 0) && (!workoutHistory || workoutHistory.length === 0) && (
            <div className="gradient-card rounded-2xl p-8 text-center">
              <p className="text-2xl mb-2">💪</p>
              <p className="text-sm text-slate-400">No workouts logged yet. Head to the Workout tab to start!</p>
            </div>
          )}
        </div>
      )}

      {/* ── SLEEP TAB ── */}
      {progressTab==='sleep' && (
        <div>
          <p className="text-sm font-bold text-slate-300 mb-3">😴 Sleep — Last 7 Days</p>
          <div className="gradient-card rounded-2xl p-4 mb-4">
            {last7.map(dateKey=>{
              const s = ls.get('fitfuel_sleep_'+dateKey, null);
              const isToday = dateKey===TODAY_KEY;
              const qualEmoji = ['','😫','😕','😐','🙂','😊'];
              return (
                <div key={dateKey} className="flex items-center justify-between py-2 border-b border-slate-800 last:border-0">
                  <span className="text-xs text-slate-400 w-20">{dateKey.slice(5)}{isToday?' · Today':''}</span>
                  {s ? (
                    <>
                      <div className="flex-1 mx-2">
                        <div style={{background:'#2a2a2a',borderRadius:4,height:6,overflow:'hidden'}}>
                          <div style={{width:`${(s.hours/12)*100}%`,height:'100%',background:'#ffffff',borderRadius:4}}/>

                    </>

          </div>
          <p className="text-xs text-slate-500">Log sleep via the ⚡ Quick Log button → 😴 Sleep tab.</p>
        </div>
      )}

      {showAlcohol && <AlcoholLogModal onSave={e=>{logAlcohol(e);setShowAlcohol(false);}} onClose={()=>setShowAlcohol(false)}/>}
      {showHistory && <HistoryModal workoutHistory={workoutHistory} onClose={()=>setShowHistory(false)}/>}
    </div>
  );
}

function InstallGuide({ showToast }) {
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [installed, setInstalled] = useState(false);
  const [platform, setPlatform] = useState('unknown');

  useEffect(() => {
    // Detect platform
    const ua = navigator.userAgent;
    if (/iphone|ipad|ipod/i.test(ua)) setPlatform('ios');
    else if (/android/i.test(ua)) setPlatform('android');
    else setPlatform('desktop');

    // Check if already installed
    if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
      setInstalled(true);
    }

    const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); };
    window.addEventListener('beforeinstallprompt', handler);
    window.addEventListener('appinstalled', () => { setInstalled(true); setDeferredPrompt(null); });
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const triggerInstall = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if (result.outcome === 'accepted') {
      showToast('🎉 FitFuel Pro installed!');
      setInstalled(true);
    }
    setDeferredPrompt(null);
  };

  if (installed) {
    return (
      <div className="gradient-card rounded-2xl p-4 mb-4">
        <div className="flex items-center gap-3">
          <span style={{fontSize:28}}>✅</span>
          <div>
            <p className="text-sm font-bold text-white">App Installed!</p>
            <p className="text-xs text-slate-400">FitFuel Pro is on your home screen and works offline.</p>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="gradient-card rounded-2xl p-4 mb-4">
      <div className="flex items-center gap-2 mb-3">
        <span style={{fontSize:22}}>📲</span>
        <p className="text-sm font-bold text-white">Install FitFuel Pro</p>
      </div>
      <p className="text-xs text-slate-400 mb-3">Add to your home screen for the full app experience — works offline, no App Store needed!</p>

      {/* Android / Desktop — browser prompt available */}
      {deferredPrompt && (
        <button className="btn btn-primary w-full mb-3" onClick={triggerInstall}>
          ⬇️ Install App Now
        </button>
      )}

      {/* iOS instructions */}
      {platform === 'ios' && (
        <div className="rounded-xl p-3 mb-3" style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.25)'}}>
          <p className="text-xs font-bold text-white mb-2">📱 iPhone / iPad — Safari</p>
          <div className="space-y-1.5">
            {[
              {step:'1', text:'Open this page in Safari (not Chrome)'},
              {step:'2', text:'Tap the Share button at the bottom (the box with an arrow ↑)'},
              {step:'3', text:'Scroll down and tap "Add to Home Screen"'},
              {step:'4', text:'Tap "Add" — FitFuel Pro is now on your home screen!'},
            ].map(({step,text})=>(
              <div key={step} className="flex items-start gap-2">
                <span className="shrink-0 w-5 h-5 rounded-full text-xs font-bold flex items-center justify-center"
                  style={{background:'#ffffff',color:'#000000',fontWeight:700}}>{step}</span>
                <p className="text-xs text-slate-300">{text}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Android instructions */}
      {platform === 'android' && !deferredPrompt && (
        <div className="rounded-xl p-3 mb-3" style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.25)'}}>
          <p className="text-xs font-bold text-white mb-2">🤖 Android — Chrome</p>
          <div className="space-y-1.5">
            {[
              {step:'1', text:'Open this page in Google Chrome'},
              {step:'2', text:'Tap the 3-dot menu (⋮) at the top right'},
              {step:'3', text:'Tap "Add to Home screen"'},
              {step:'4', text:'Tap "Add" — done!'},
            ].map(({step,text})=>(
              <div key={step} className="flex items-start gap-2">
                <span className="shrink-0 w-5 h-5 rounded-full text-xs font-bold flex items-center justify-center"
                  style={{background:'#ffffff',color:'#000000',fontWeight:700}}>{step}</span>
                <p className="text-xs text-slate-300">{text}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Desktop instructions */}
      {platform === 'desktop' && !deferredPrompt && (
        <div className="rounded-xl p-3 mb-3" style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.25)'}}>
          <p className="text-xs font-bold text-white mb-2">💻 Desktop — Chrome / Edge</p>
          <div className="space-y-1.5">
            {[
              {step:'1', text:'Look for the install icon (⊕) in the address bar'},
              {step:'2', text:'Click it and select "Install"'},
              {step:'3', text:'Or go to Chrome menu → "Install FitFuel Pro"'},
            ].map(({step,text})=>(
              <div key={step} className="flex items-start gap-2">
                <span className="shrink-0 w-5 h-5 rounded-full text-xs font-bold flex items-center justify-center"
                  style={{background:'#ffffff',color:'#000000',fontWeight:700}}>{step}</span>
                <p className="text-xs text-slate-300">{text}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Share link */}
      <button className="btn btn-secondary w-full text-xs"
        onClick={()=>{ navigator.clipboard?.writeText(window.location.href); showToast('🔗 Link copied — share with friends!'); }}>
        🔗 Copy Link to Share
      </button>
      <p className="text-xs text-slate-500 text-center mt-2">Anyone with this link can use FitFuel Pro — no account needed</p>
    </div>
  );
}

// ── Notification Settings Component ──────────────────────────────────────
function NotificationSettings() {
  const [perm, setPerm] = useState(() => 'Notification' in window ? Notification.permission : 'unsupported');
  const [prefs, setPrefs] = useState(() => ls.get('fitfuel_notif_prefs', {
    meals: true, water: true, supplements: true
  }));
  const togglePref = (k) => {
    const updated = { ...prefs, [k]: !prefs[k] };
    setPrefs(updated);
    ls.set('fitfuel_notif_prefs', updated);
  };
  const requestPerm = async () => {
    const result = await Notification.requestPermission();
    setPerm(result);
  };
  if (perm === 'unsupported') return <p className="text-xs text-slate-500">Notifications not supported on this browser.</p>;
  return (
    <div>
      {perm !== 'granted' ? (
        <button className="btn btn-primary w-full text-sm" onClick={requestPerm}>
          🔔 Enable Notifications
        </button>
      ) : (
        <div className="space-y-2">
          <p className="text-xs text-green-400 mb-2">✓ Notifications enabled</p>
          {[
            {key:'meals', label:'🍽️ Meal Reminders', sub:'8am · 1pm · 4pm · 8pm'},
            {key:'water', label:'💧 Water Reminders', sub:'Every 2 hours (8am–10pm)'},
            {key:'supplements', label:'💊 Supplement Reminders', sub:'8:30am · 8:30pm'},

              <div>
                <p className="text-xs text-white">{label}</p>

              </div>
              <div className="w-10 h-5 rounded-full cursor-pointer flex items-center"
                style={{background:prefs[key]?'#ffffff':'#2a2a2a',padding:'2px',border:'1px solid #3d3d3d'}}

// ── Notification Engine (runs inside App) ─────────────────────────────────
function useNotifications(dayType) {
  useEffect(() => {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const prefs = ls.get('fitfuel_notif_prefs', { meals:true, water:true, supplements:true });
    const notified = ls.get('fitfuel_notified_' + TODAY_KEY, {});
    const show = (title, body) => new Notification(title, { body, icon:'./icon.svg' });
    const check = () => {
      const now = new Date();
      const h = now.getHours(), m = now.getMinutes();
      const key = `${h}:${m<10?'0'+m:m}`;
      if (notified[key]) return;
      if (prefs.meals) {
        if (h===8&&m===0) show('🌅 Breakfast time!', "Your morning meal plan is ready in FitFuel.");
        if (h===13&&m===0) show('☀️ Lunch time!', "Midday fuel-up! Open FitFuel for today's lunch.");
        if (h===16&&m===0) show('🍎 Snack time!', "Keep your energy up — check your snack plan.");
        if (h===20&&m===0) show('🌙 Dinner time!', "Your dinner plan is ready. Time to refuel!");
      }
      if (prefs.water && m===0 && [8,10,12,14,16,18,20].includes(h)) {
        show('💧 Drink water!', `Stay on track — sip check! Target: ${dayType==='football'?'4.0':'3.5'}L today.`);
      }
      if (prefs.supplements) {
        if (h===8&&m===30) show('💊 Morning supplements', 'Take your Vitamin D, Omega-3, and Creatine with breakfast.');
        if (h===20&&m===30) show('💊 Evening supplements', 'Time for your evening supplements with dinner.');
      }
      notified[key] = true;
      ls.set('fitfuel_notified_' + TODAY_KEY, notified);
    };
    check();
    const id = setInterval(check, 60000);
    return () => clearInterval(id);
  }, [dayType]);
}

function App() {

    const p = ls.get('fitfuel_profile', DEFAULT_PROFILE);
    // Backfill startWeight/startBodyFat for profiles created before this field existed
    if (p.setupComplete && !p.startWeight) {
      const backfilled = { ...p, startWeight: p.weight, startBodyFat: p.bodyFat, startDate: TODAY_KEY };

      return backfilled;
    }

  });

  const [water, setWater] = useState(() => ls.get('fitfuel_water_' + TODAY_KEY, 0));

    setWater(w => { const v = +Math.max(0, Math.min(6, w + n)).toFixed(2); ls.set('fitfuel_water_' + TODAY_KEY, v); return v; });

  const [pbs, setPbs] = useState(() => ls.get('fitfuel_pbs', {}));

  const addCustomMeal = useCallback((meal) => {
    setCustomMeals(prev => {
      const updated = [...prev, meal];
      ls.set('fitfuel_custom_' + TODAY_KEY, updated);
      return updated;
    });
  }, []);

  const logActivity = useCallback((activity) => {
    setCustomActivities(prev => {
      const updated = [...prev, activity];
      ls.set('fitfuel_acts_' + TODAY_KEY, updated);
      return updated;
    });

  const deleteActivity = useCallback((id) => {

      const updated = prev.filter(a => a.id !== id);
      ls.set('fitfuel_acts_' + TODAY_KEY, updated);
      return updated;

      const updated = [...prev, entry];

    });
    setPbs(prev => {
      const existing = prev[exercise];
      const isNewPB = !existing || e1rm > existing.e1rm;
      if (isNewPB) {
        const updated = { ...prev, [exercise]: { weight: +bestSet.weight, reps: +bestSet.reps, e1rm, date: TODAY_KEY } };
        ls.set('fitfuel_pbs', updated);
        showToast(`🏆 New PB! ${exercise} — ${e1rm}kg est. 1RM`);
        return updated;
      }
      showToast(`✓ Sets logged — ${exercise}`);
      return prev;
    });
  }, [showToast]);

  const [pantry, setPantry] = useState(() => ls.get('fitfuel_pantry', [
    'olive oil','salt','pepper','onion','garlic','ginger',
    'cumin seeds','turmeric','red chilli','coriander powder','garam masala','moong sprouts (boiled)'
  ]));

  const [toast, setToast] = useState(null);
  const showToast = useCallback((msg) => { setToast(msg); }, []);

  const [theme, setTheme] = useState(() => ls.get('fitfuel_theme', 'dark'));
  useEffect(() => {
    document.body.classList.toggle('light', theme === 'light');
  }, [theme]);
  const toggleTheme = useCallback(() => {
    setTheme(t => { const n = t==='dark'?'light':'dark'; ls.set('fitfuel_theme',n); return n; });
  }, []);

  const [showQuickLog, setShowQuickLog] = useState(false);

  const dayType = useMemo(() => getDayType(profile, TODAY_IDX), [profile]);
  const targets = useMemo(() => calcTargets(profile, dayType), [profile, dayType]);
  useNotifications(dayType);

  const updateProfile = useCallback((p) => {
    setProfile(p);
    ls.set('fitfuel_profile', p);
  }, []);

  const selectMeal = useCallback((type, id) => {
    setSelectedMeals(s => {
      const updated = { ...s, [type]: id };
      ls.set(`fitfuel_meals_${TODAY_KEY}`, updated);
      return updated;
    });
  }, []);

  const toggleEaten = useCallback((type, meal) => {
    setEatenMeals(s => {
      const updated = s[type] ? { ...s, [type]: null } : { ...s, [type]: meal };
      ls.set(`fitfuel_eaten_${TODAY_KEY}`, updated);
      return updated;
    });
  }, []);

  const togglePantry = useCallback((ingredient) => {
    const key = ingredient.toLowerCase();
    setPantry(p => {
      const updated = p.includes(key) ? p.filter(i=>i!==key) : [...p, key];
      ls.set('fitfuel_pantry', updated);
      return updated;
    });
  }, []);

  if (!profile.setupComplete) {
    return <ProfileSetup onComplete={updateProfile}/>;
  }

  const renderContent = () => {
    switch(activeTab) {
      case 'home': return (
        <Dashboard profile={profile} targets={targets} dayType={dayType}
          selectedMeals={selectedMeals} eatenMeals={eatenMeals} onNavigate={setActiveTab}
          water={water} addWater={addWater} steps={steps} setSteps={setSteps}
          customMeals={customMeals} customActivities={customActivities} showToast={showToast}
          onOpenSettings={()=>setActiveTab('profile')}/>
      );
      case 'meals': return (
        <MealsView profile={profile} dayType={dayType} selectedMeals={selectedMeals} onSelectMeal={selectMeal}
          eatenMeals={eatenMeals} onToggleEaten={toggleEaten}
          pantry={pantry} onTogglePantry={togglePantry}
          customMeals={customMeals} onAddCustomMeal={addCustomMeal}/>
      );
      case 'workout': return (
        <WorkoutView dayType={dayType} pbs={pbs} onLogSets={logSets}
          onLogActivity={logActivity} onDeleteActivity={deleteActivity}
          customActivities={customActivities} workoutHistory={workoutHistory}
          onWeekly={()=>setActiveTab('weekly')}/>
      );
      case 'weekly': return <WeeklyView profile={profile}/>;
      case 'progress': return (
        <ProgressView profile={profile} onUpdateProfile={updateProfile}
          pbs={pbs} workoutHistory={workoutHistory} showToast={showToast}/>
      );
      case 'profile': return (
        <ProfileView profile={profile} onUpdateProfile={updateProfile}
          pantry={pantry} onTogglePantry={togglePantry} showToast={showToast}
          theme={theme} onToggleTheme={toggleTheme}/>
      );
      default: return null;
    }
  };

  return (
    <div className="max-w-lg mx-auto min-h-screen">
      {toast && <Toast message={toast} onDone={()=>setToast(null)}/>}
      {showQuickLog && (
        <QuickLogSheet onClose={()=>setShowQuickLog(false)}
          addWater={addWater} onLogActivity={logActivity}
          onAddCustomMeal={addCustomMeal} showToast={showToast}/>
      )}
      <div className="overflow-y-auto" style={{maxHeight:'100dvh',paddingBottom:0}}>
        {renderContent()}
      </div>
      <BottomNav active={activeTab} onChange={setActiveTab} onQuickLog={()=>setShowQuickLog(true)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('FitFuel SW registered, scope:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
